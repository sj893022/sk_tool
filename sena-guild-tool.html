<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세나 리버스 - 길드전 배치툴</title>
<style>
:root{
  --bg:#0d0f1a;--bg2:#161929;--bg3:#1e2236;--card:#1a1d2e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#e8b84b;--gold2:#f5d080;--red:#e05555;--green:#45b87a;
  --purple:#9b6fe0;--blue:#4a8fe0;--text:#e8eaf0;--text2:#9aa0b8;--text3:#6a708a;
  --c-def:#e8b84b; --c-atk:#45b87a; --c-skill:#9b6fe0; --c-pet:#64a0f0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;}

/* ── HEADER ── */
.header{background:linear-gradient(180deg,#0a0c18,var(--bg));border-bottom:1px solid var(--border2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0d0f1a;}
.logo-text{font-size:15px;font-weight:600;}
.logo-sub{font-size:11px;color:var(--text3);}
.hbtns{display:flex;gap:6px;flex-wrap:wrap;}

/* ── LAYOUT ── */
.wrap{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 56px);}
.main-area{padding:20px;border-right:1px solid var(--border);overflow-y:auto;}
.side-panel{padding:16px;overflow-y:auto;background:var(--bg2);}
@media(max-width:940px){.wrap{grid-template-columns:1fr;}.side-panel{border-top:1px solid var(--border);}}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-gold{background:var(--gold);color:#0d0f1a;}.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}.btn-ghost:hover{background:var(--bg3);}
.btn-red{background:rgba(224,85,85,.18);color:var(--red);border:1px solid rgba(224,85,85,.3);}.btn-red:hover{background:rgba(224,85,85,.28);}
.btn-teal{background:rgba(69,184,122,.15);color:var(--green);border:1px solid rgba(69,184,122,.3);}.btn-teal:hover{background:rgba(69,184,122,.25);}
.btn-sm{padding:4px 10px;font-size:11px;}.btn-xs{padding:3px 8px;font-size:10px;}

.page-sec-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.page-sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── DECK ROW ── */
.deck-row{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .15s;}
.deck-row.expanded{border-color:var(--border2);}
.deck-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;}
.deck-header:hover{background:rgba(255,255,255,.02);}
.deck-chevron{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;width:14px;}
.deck-row.expanded .deck-chevron{transform:rotate(90deg);}
.deck-title-wrap{flex:1;min-width:0;}
.deck-name-input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-weight:600;width:100%;cursor:text;border-bottom:1px solid transparent;transition:border-color .15s;}
.deck-name-input:hover{border-bottom-color:rgba(255,255,255,.15);}
.deck-name-input:focus{border-bottom-color:var(--gold);}
.deck-name-input::placeholder{color:var(--text3);}
.deck-meta{font-size:10px;color:var(--text3);margin-top:2px;}
.deck-preview{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.prev-slot{width:30px;height:36px;border-radius:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.prev-slot img{width:100%;height:100%;object-fit:cover;}
.prev-slot .pe{font-size:14px;}

/* ── DECK BODY ── */
.deck-body{display:none;}
.deck-row.expanded .deck-body{display:block;}

/* ── SECTIONS ── */
.deck-section{position:relative;padding:12px 14px 14px 18px;border-top:1px solid var(--border);}
.deck-section::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.deck-section.s-def{background:rgba(232,184,75,.025);}
.deck-section.s-def::before{background:var(--c-def);}
.deck-section.s-atk{background:rgba(69,184,122,.025);}
.deck-section.s-atk::before{background:var(--c-atk);}
.deck-section.s-skill{background:rgba(155,111,224,.025);}
.deck-section.s-skill::before{background:var(--c-skill);}
.deck-section.s-pet{background:rgba(100,160,240,.025);}
.deck-section.s-pet::before{background:var(--c-pet);}

.sec-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.sec-label span{opacity:.9;}
.sec-label::after{content:'';flex:1;height:1px;opacity:.2;}
.s-def .sec-label{color:var(--c-def);}.s-def .sec-label::after{background:var(--c-def);}
.s-atk .sec-label{color:var(--c-atk);}.s-atk .sec-label::after{background:var(--c-atk);}
.s-skill .sec-label{color:var(--c-skill);}.s-skill .sec-label::after{background:var(--c-skill);}
.s-pet .sec-label{color:var(--c-pet);}.s-pet .sec-label::after{background:var(--c-pet);}

/* ── HERO SLOTS ── */
.slots-row{display:flex;gap:8px;flex-wrap:wrap;}
.slot{width:80px;border-radius:10px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;flex-shrink:0;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);}
.slot:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);}
.slot.filled{border-style:solid;border-color:rgba(255,255,255,.14);}
.slot.active-pick{border-color:var(--gold)!important;background:rgba(232,184,75,.08)!important;box-shadow:0 0 0 1px var(--gold);}
.slot-img{width:80px;height:80px;object-fit:cover;display:block;}
.slot-emoji{font-size:28px;padding:14px 0 6px;}
.slot-add{font-size:24px;color:rgba(255,255,255,.14);padding:26px 0;}
.slot-name{font-size:8px;color:var(--text2);text-align:center;padding:2px 3px 3px;max-width:78px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-skills{display:flex;gap:3px;padding:0 3px 5px;justify-content:center;}
.skill-ic{width:30px;height:30px;border-radius:5px;object-fit:cover;border:1px solid rgba(255,255,255,.1);}
.skill-ic-e{width:30px;height:30px;border-radius:5px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.08);}
.sbar{position:absolute;top:0;left:0;right:0;height:3px;}
.srm{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#fff;line-height:1;}
.slot:hover .srm{display:flex;}

/* ── ATTACK SLOTS ── */
.aslot{width:80px;border-radius:10px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;flex-shrink:0;background:rgba(69,184,122,.04);border:1px dashed rgba(69,184,122,.2);}
.aslot:hover{border-color:rgba(69,184,122,.4);}
.aslot.filled{border-style:solid;border-color:rgba(69,184,122,.2);background:rgba(69,184,122,.05);}
.aslot.active-pick{border-color:var(--green)!important;background:rgba(69,184,122,.1)!important;box-shadow:0 0 0 1px var(--green);}
.aslot .srm{display:none;}.aslot:hover .srm{display:flex;}

/* ── ATK DECK ROW ── */
.atk-deck-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;padding:10px 12px;background:rgba(69,184,122,.04);border:1px solid rgba(69,184,122,.12);border-radius:10px;}
.atk-deck-num{font-size:9px;color:var(--c-atk);font-weight:700;width:16px;padding-top:8px;flex-shrink:0;}
.atk-deck-slots{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
.atk-deck-del{width:24px;height:24px;border-radius:6px;background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;margin-top:6px;transition:all .15s;}
.atk-deck-del:hover{background:rgba(224,85,85,.3);}
.add-atk-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--c-atk);cursor:pointer;padding:6px 12px;border:1px dashed rgba(69,184,122,.35);border-radius:8px;background:transparent;transition:all .15s;font-weight:600;}
.add-atk-btn:hover{background:rgba(69,184,122,.07);border-color:rgba(69,184,122,.6);}

/* ── SKILL ORDER ── */
.skill-order-grid{display:flex;gap:12px;flex-wrap:wrap;}
.so-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
.so-num-label{font-size:9px;color:var(--c-skill);font-weight:700;opacity:.8;}
.so-slot{width:58px;height:58px;border-radius:10px;background:rgba(155,111,224,.06);border:1px dashed rgba(155,111,224,.28);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;}
.so-slot:hover{border-color:rgba(155,111,224,.55);}
.so-slot.active-pick{border-color:var(--purple)!important;box-shadow:0 0 0 1px var(--purple);background:rgba(155,111,224,.12)!important;}
.so-slot img{width:100%;height:100%;object-fit:cover;}
.so-slot .so-plus{font-size:22px;color:rgba(155,111,224,.3);}
.so-slot .so-rm{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;line-height:1;}
.so-slot:hover .so-rm{display:flex;}
.so-hero-label{font-size:8px;color:var(--text2);text-align:center;max-width:58px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}

/* ── PET SLOT ── */
.pet-slot-big{width:80px;border-radius:12px;background:rgba(100,160,240,.05);border:1px dashed rgba(100,160,240,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:all .15s;min-height:80px;}
.pet-slot-big:hover{border-color:rgba(100,160,240,.5);}
.pet-slot-big.filled{border-style:solid;border-color:rgba(100,160,240,.3);}
.pet-slot-big.active-pick{border-color:var(--c-pet)!important;box-shadow:0 0 0 1px var(--c-pet);}
.pet-slot-big img{width:80px;height:80px;object-fit:cover;display:block;}
.pet-big-add{font-size:28px;color:rgba(100,160,240,.3);padding:16px 0;}
.pet-big-name{font-size:9px;color:var(--text2);text-align:center;padding:4px 3px 6px;max-width:78px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pet-slot-big .pet-rm{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;}
.pet-slot-big:hover .pet-rm{display:flex;}

/* ── NOTE + ACTIONS ── */
.deck-bottom{padding:10px 14px 14px;}
.deck-note-wrap textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:12px;padding:8px 10px;outline:none;resize:vertical;min-height:42px;font-family:inherit;}
.deck-actions{display:flex;gap:6px;margin-top:8px;}
.add-deck-btn{border:1px dashed var(--border2);border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:var(--text3);font-size:13px;transition:all .15s;margin-bottom:20px;}
.add-deck-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(232,184,75,.04);}

/* ── SIDE PANEL ── */
.pick-hint{border-radius:8px;padding:8px 12px;font-size:11px;margin-bottom:12px;display:none;align-items:center;justify-content:space-between;gap:8px;}
.pick-hint.show{display:flex;}
.pick-hint.def{background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.35);color:var(--c-def);}
.pick-hint.atk{background:rgba(69,184,122,.12);border:1px solid rgba(69,184,122,.35);color:var(--c-atk);}
.pick-hint.skill{background:rgba(155,111,224,.12);border:1px solid rgba(155,111,224,.35);color:var(--c-skill);}
.pick-hint.pet-mode{background:rgba(100,160,240,.12);border:1px solid rgba(100,160,240,.35);color:var(--c-pet);}

.side-search{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px;}
.side-search::placeholder{color:var(--text3);}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.ftab{font-size:10px;padding:3px 8px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;}
.ftab.on{background:var(--gold);color:#0d0f1a;border-color:var(--gold);font-weight:600;}
.char-list{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}

.char-card{background:var(--bg3);border-radius:8px;padding:6px 4px 5px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.char-card:hover{border-color:var(--gold);background:rgba(232,184,75,.06);}
.char-card.dimmed{opacity:.35;pointer-events:none;}
.char-card.hl-atk{border-color:rgba(69,184,122,.5);background:rgba(69,184,122,.06);}
.char-card.hl-def{border-color:rgba(232,184,75,.5);background:rgba(232,184,75,.06);}
.char-card.hl-skill{border-color:rgba(155,111,224,.5);background:rgba(155,111,224,.06);}
.cimg{width:52px;height:52px;border-radius:7px;margin:0 auto 3px;overflow:hidden;position:relative;}
.cimg img{width:100%;height:100%;object-fit:cover;}
.cimge{font-size:24px;line-height:52px;display:block;text-align:center;}
.crbar{position:absolute;bottom:0;left:0;right:0;height:3px;}
.rarity-legendary{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.rarity-epic{background:linear-gradient(90deg,var(--purple),#b088f0);}
.rarity-rare{background:linear-gradient(90deg,var(--blue),#6aaaf5);}
.cname{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctype{font-size:8px;margin-top:1px;}
.type-공격형{color:#e05555;}.type-마법형{color:#6aaaf5;}.type-지원형{color:#45b87a;}.type-방어형{color:#e8b84b;}.type-만능형{color:#9b6fe0;}
.av-공격형{background:rgba(224,85,85,.15);}.av-마법형{background:rgba(106,170,245,.15);}.av-지원형{background:rgba(69,184,122,.15);}.av-방어형{background:rgba(232,184,75,.15);}.av-만능형{background:rgba(155,111,224,.15);}
.tb-공격형{background:linear-gradient(90deg,#e05555,#f07070);}.tb-마법형{background:linear-gradient(90deg,#4a8fe0,#6aaaf5);}.tb-지원형{background:linear-gradient(90deg,#45b87a,#6dd49a);}.tb-방어형{background:linear-gradient(90deg,#e8b84b,#f5d080);}.tb-만능형{background:linear-gradient(90deg,#9b6fe0,#b088f0);}
.in-def-badge{position:absolute;top:2px;left:2px;font-size:7px;background:rgba(224,85,85,.75);color:#fff;padding:1px 3px;border-radius:3px;line-height:1.4;}
.in-atk-badge{position:absolute;top:2px;right:2px;font-size:7px;background:rgba(69,184,122,.75);color:#fff;padding:1px 3px;border-radius:3px;line-height:1.4;}
.char-card-skills{display:flex;gap:3px;justify-content:center;margin-top:3px;}
.cc-skill{width:22px;height:22px;border-radius:4px;object-fit:cover;border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:all .15s;}
.cc-skill:hover{border-color:var(--purple);transform:scale(1.12);}
.cc-skill-empty{width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.08);}

.pet-card{background:var(--bg3);border-radius:8px;padding:6px 4px 5px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.pet-card:hover{border-color:var(--c-pet);background:rgba(100,160,240,.06);}
.pet-card.hl-pet{border-color:rgba(100,160,240,.5);background:rgba(100,160,240,.06);}
.pimg{width:52px;height:52px;border-radius:7px;margin:0 auto 3px;overflow:hidden;background:rgba(100,160,240,.1);display:flex;align-items:center;justify-content:center;}
.pimg img{width:100%;height:100%;object-fit:cover;}
.pname{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-head h3{font-size:14px;font-weight:600;}
.modal-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:0;}
.modal-body{padding:16px;overflow-y:auto;}
.form-field{margin-bottom:12px;}
.form-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;letter-spacing:.04em;}
.form-field input,.form-field select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.frow{display:flex;gap:8px;}.frow .form-field{flex:1;}
.img-upload-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.img-box{width:82px;height:82px;flex-shrink:0;border-radius:10px;border:1px dashed var(--border2);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.img-box:hover{border-color:var(--gold);}
.img-box.purple:hover{border-color:var(--purple);}
.img-box img{width:100%;height:100%;object-fit:cover;display:none;}
.img-box .uh{font-size:9px;color:var(--text3);text-align:center;padding:3px;pointer-events:none;line-height:1.5;}
.img-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.skill-upload-row{display:flex;gap:10px;margin-bottom:12px;}
.skill-img-box{width:66px;height:66px;flex-shrink:0;border-radius:8px;border:1px dashed rgba(155,111,224,.35);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.skill-img-box:hover{border-color:var(--purple);}
.skill-img-box img{width:100%;height:100%;object-fit:cover;display:none;}
.skill-img-box .uh{font-size:9px;color:var(--text3);text-align:center;pointer-events:none;line-height:1.5;}
.skill-img-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.skill-box-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.skill-box-label{font-size:10px;color:var(--text3);}
.modal-char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}
.modal-pet-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">7K</div>
    <div>
      <div class="logo-text">길드전 배치툴</div>
      <div class="logo-sub">세븐나이츠 리버스</div>
    </div>

<script>
var heroes = JSON.parse(localStorage.getItem('sk5_heroes')||'null') || [

  {id:'vanessa',name:'바네사',type:'공격형',rarity:'legendary',emoji:'🏹',img:'',s1:'',s2:''},
  {id:'li',name:'리',type:'공격형',rarity:'legendary',emoji:'👊',img:'',s1:'',s2:''},
  {id:'yui',name:'유이',type:'지원형',rarity:'epic',emoji:'💚',img:'',s1:'',s2:''},
  {id:'cleo',name:'클레오',type:'마법형',rarity:'epic',emoji:'🌙',img:'',s1:'',s2:''},

  {id:'ruina',name:'루이나',type:'마법형',rarity:'legendary',emoji:'❄',img:'',s1:'',s2:''},
  {id:'spike',name:'스파이크',type:'방어형',rarity:'legendary',emoji:'🛡',img:'',s1:'',s2:''},
  {id:'kei',name:'케이',type:'만능형',rarity:'legendary',emoji:'🔱',img:'',s1:'',s2:''},
  {id:'elena',name:'엘레나',type:'지원형',rarity:'legendary',emoji:'💫',img:'',s1:'',s2:''},
  {id:'trud',name:'트루드',type:'공격형',rarity:'legendary',emoji:'⚔',img:'',s1:'',s2:''},
  {id:'ryan',name:'라이언',type:'공격형',rarity:'legendary',emoji:'⚡',img:'',s1:'',s2:''},
  {id:'chosun',name:'초선',type:'마법형',rarity:'legendary',emoji:'🌸',img:'',s1:'',s2:''},
  {id:'songoku',name:'손오공',type:'방어형',rarity:'legendary',emoji:'🌪',img:'',s1:'',s2:''},
  {id:'milia',name:'밀리아',type:'마법형',rarity:'legendary',emoji:'💎',img:'',s1:'',s2:''},
  {id:'rudy',name:'루디',type:'공격형',rarity:'epic',emoji:'⚔',img:'',s1:'',s2:''},
];
heroes.forEach(function(h){if(!h.s1)h.s1='';if(!h.s2)h.s2='';});

var pets  = JSON.parse(localStorage.getItem('sk5_pets')||'[]');
var decks = JSON.parse(localStorage.getItem('sk5_decks')||'null') || [
  {id:'d1',name:'방어덱 1',def:[null,null,null],atks:[[null,null,null]],skillOrder:[null,null,null],pet:null,note:'',expanded:false},
  {id:'d2',name:'방어덱 2',def:[null,null,null],atks:[[null,null,null]],skillOrder:[null,null,null],pet:null,note:'',expanded:false},
  {id:'d3',name:'방어덱 3',def:[null,null,null],atks:[[null,null,null]],skillOrder:[null,null,null],pet:null,note:'',expanded:false},
];
decks.forEach(function(d){
  if(!d.atks){d.atks=[d.atk||[null,null,null]];delete d.atk;}
  if(!d.skillOrder)d.skillOrder=[null,null,null];
  if(d.pet===undefined)d.pet=null;
});

var pick=null, heroFilter='전체';
var editHeroId=null, editPetId=null;
var pendingHeroImg='', pendingSkill1='', pendingSkill2='', pendingPetImg='';

function persist(){
  localStorage.setItem('sk5_heroes',JSON.stringify(heroes));
  localStorage.setItem('sk5_decks', JSON.stringify(decks));
  localStorage.setItem('sk5_pets',  JSON.stringify(pets));
}
function doSave(){persist();showToast('저장됨');}
function doReset(){
  if(!confirm('모든 배치를 초기화할까요?'))return;
  decks.forEach(function(d){d.def=[null,null,null];d.atks=[[null,null,null]];d.skillOrder=[null,null,null];d.pet=null;});
  persist();render();showToast('초기화됨');
}

function getHero(id){return heroes.find(function(h){return h.id===id;});}
function getPet(id){return pets.find(function(p){return p.id===id;});}
function defUsedSet(){var s=new Set();decks.forEach(function(d){d.def.forEach(function(x){if(x)s.add(x);});});return s;}
function atkUsedSet(){var s=new Set();decks.forEach(function(d){(d.atks||[]).forEach(function(a){a.forEach(function(x){if(x)s.add(x);});});});return s;}

function heroThumb(h,size){
  size=size||52;
  if(!h)return '<div style="width:'+size+'px;height:'+size+'px;border-radius:7px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:'+(size*.5)+'px">?</div>';
  if(h.img)return '<div class="cimg" style="width:'+size+'px;height:'+size+'px;"><img src="'+h.img+'" loading="lazy"><div class="crbar rarity-'+h.rarity+'"></div></div>';
  return '<div class="cimg av-'+h.type+'" style="width:'+size+'px;height:'+size+'px;"><span class="cimge" style="font-size:'+(size*.46)+'px;line-height:'+size+'px">'+(h.emoji||'?')+'</span><div class="crbar rarity-'+h.rarity+'"></div></div>';
}

// ── RENDER DECKS ─────────────────────────────────────────────
function renderDecks(){
  var c=document.getElementById('decks-container');
  var html='';
  decks.forEach(function(deck){
    var prevHtml=deck.def.map(function(hid){
      var h=hid?getHero(hid):null;
      return '<div class="prev-slot">'+(h?(h.img?'<img src="'+h.img+'">':'<span class="pe">'+(h.emoji||'?')+'</span>'):'')+'</div>';
    }).join('');

    var defFilled=deck.def.filter(Boolean).length;
    var atkFilled=(deck.atks||[]).reduce(function(s,a){return s+a.filter(Boolean).length;},0);
    var skillFilled=deck.skillOrder.filter(Boolean).length;
    var petFilled=!!deck.pet;

    html+='<div class="deck-row'+(deck.expanded?' expanded':'')+'" id="dk-'+deck.id+'">';

    // HEADER
    html+='<div class="deck-header" onclick="toggleDeck(\''+deck.id+'\')">';
    html+='<span class="deck-chevron">▶</span>';
    html+='<div class="deck-title-wrap">';
    html+='<input class="deck-name-input" value="'+xe(deck.name)+'" placeholder="덱 이름..." onclick="event.stopPropagation()" onchange="renameDeck(\''+deck.id+'\',this.value)" onblur="renameDeck(\''+deck.id+'\',this.value)">';
    html+='<div class="deck-meta">방어 '+defFilled+'/3 &nbsp;·&nbsp; 공격덱 '+(deck.atks||[]).length+'개 &nbsp;·&nbsp; 스킬 '+skillFilled+'/3'+(petFilled?' &nbsp;·&nbsp; 🐾':'')+'</div>';
    html+='</div>';
    html+='<div class="deck-preview">'+prevHtml+'</div>';
    html+='</div>';

    // BODY
    html+='<div class="deck-body">';

    // ── 섹션 1: 방어덱 ──
    html+='<div class="deck-section s-def">';
    html+='<div class="sec-label"><span>🔴 방어 슬롯</span></div>';
    html+='<div class="slots-row">';
    deck.def.forEach(function(hid,si){html+=makeDefSlot(deck.id,si,hid);});
    html+='</div></div>';

    // ── 섹션 2: 카운터 공격덱 ──
    html+='<div class="deck-section s-atk">';
    html+='<div class="sec-label"><span>🟢 카운터 공격덱</span></div>';
    (deck.atks||[]).forEach(function(atk,ai){
      var slots=atk.map(function(hid,si){return makeAtkSlot(deck.id,ai,si,hid);}).join('');
      var del=deck.atks.length>1?'<div class="atk-deck-del" onclick="delAtkDeck(\''+deck.id+'\','+ai+')">✕</div>':'';
      html+='<div class="atk-deck-row"><span class="atk-deck-num">'+(ai+1)+'</span><div class="atk-deck-slots">'+slots+'</div>'+del+'</div>';
    });
    html+='<div class="add-atk-btn" onclick="addAtkDeck(\''+deck.id+'\')">＋ 공격덱 추가</div>';
    html+='</div>';

    // ── 섹션 3: 스킬순서 ──
    html+='<div class="deck-section s-skill">';
    html+='<div class="sec-label"><span>⚡ 스킬 순서</span></div>';
    html+='<div class="skill-order-grid">';
    deck.skillOrder.forEach(function(so,i){
      var isActive=pick&&pick.mode==='skill'&&pick.deckId===deck.id&&pick.slotIdx===i;
      var cls='so-slot'+(isActive?' active-pick':'');
      var inner,label='';
      if(so){
        var h=getHero(so.heroId);
        var sImg=h?(so.skillNum===1?h.s1:h.s2):'';
        inner=sImg?'<img src="'+sImg+'">':'<span style="font-size:12px;color:var(--c-skill);font-weight:700">'+(so.skillNum===1?'S1':'S2')+'</span>';
        label=(h?xe(h.name.slice(0,4)):'-')+(so.skillNum===1?' S1':' S2');
      } else {
        inner='<span class="so-plus">+</span>';
        label=' ';
      }
      var rm=so?'<div class="so-rm" onclick="event.stopPropagation();rmSkillOrder(\''+deck.id+'\','+i+')">✕</div>':'';
      html+='<div class="so-item"><span class="so-num-label">'+(i+1)+'순서</span><div class="'+cls+'" onclick="startSkillPick(\''+deck.id+'\','+i+')">'+inner+rm+'</div><span class="so-hero-label">'+label+'</span></div>';
    });
    html+='</div>';
    if(!defFilled) html+='<div style="margin-top:8px;font-size:11px;color:var(--text3)">방어 슬롯에 영웅을 먼저 배치하세요.</div>';
    html+='</div>';

    // ── 섹션 4: 펫 ──
    html+='<div class="deck-section s-pet">';
    html+='<div class="sec-label"><span>🐾 펫</span></div>';
    var pet=deck.pet?getPet(deck.pet):null;
    var isActivePet=pick&&pick.mode==='pet'&&pick.deckId===deck.id;
    var petCls='pet-slot-big'+(isActivePet?' active-pick':'')+(pet?' filled':'');
    if(pet){
      var pImg=pet.img?'<img src="'+pet.img+'">':'<div class="pet-big-add">🐾</div>';
      html+='<div class="'+petCls+'" onclick="startPetPick(\''+deck.id+'\')">';
      html+=pImg+'<div class="pet-big-name">'+xe(pet.name)+'</div>';
      html+='<div class="pet-rm" onclick="event.stopPropagation();rmPet(\''+deck.id+'\')">✕</div></div>';
    } else {
      html+='<div class="'+petCls+'" onclick="startPetPick(\''+deck.id+'\')">';
      html+='<div class="pet-big-add">🐾</div></div>';
    }
    if(pets.length===0) html+='<span style="font-size:11px;color:var(--text3);margin-left:10px">상단 🐾 펫 관리에서 펫을 추가하세요</span>';
    html+='</div>';

    // BOTTOM
    html+='<div class="deck-bottom">';
    html+='<div class="deck-note-wrap"><textarea placeholder="메모 (공략 팁 등...)" onchange="noteDeck(\''+deck.id+'\',this.value)">'+xe(deck.note||'')+'</textarea></div>';
    html+='<div class="deck-actions"><button class="btn btn-red btn-sm" onclick="delDeck(\''+deck.id+'\')">🗑 덱 삭제</button></div>';
    html+='</div>';

    html+='</div></div>';
  });
  c.innerHTML=html;
}

// ── SLOT BUILDERS ────────────────────────────────────────────
function makeDefSlot(deckId,si,hid){
  var h=hid?getHero(hid):null;
  var isActive=pick&&pick.mode==='def'&&pick.deckId===deckId&&pick.slotIdx===si;
  var cls='slot'+(isActive?' active-pick':'')+(h?' filled':'');
  if(h){
    var img=h.img?'<img class="slot-img" src="'+h.img+'">':'<span class="slot-emoji">'+(h.emoji||'?')+'</span>';
    var s1=h.s1?'<img class="skill-ic" src="'+h.s1+'">':'<div class="skill-ic-e"></div>';
    var s2=h.s2?'<img class="skill-ic" src="'+h.s2+'">':'<div class="skill-ic-e"></div>';
    return '<div class="'+cls+'"><div class="sbar tb-'+h.type+'"></div>'+img+'<span class="slot-name">'+xe(h.name)+'</span><div class="slot-skills">'+s1+s2+'</div><div class="srm" onclick="event.stopPropagation();rmSlot(\''+deckId+'\',\'def\','+si+',null)">✕</div></div>';
  }
  return '<div class="'+cls+'" onclick="startPick(\''+deckId+'\',\'def\','+si+',null)"><span class="slot-add">+</span></div>';
}
function makeAtkSlot(deckId,ai,si,hid){
  var h=hid?getHero(hid):null;
  var isActive=pick&&pick.mode==='atk'&&pick.deckId===deckId&&pick.atkIdx===ai&&pick.slotIdx===si;
  var cls='aslot'+(isActive?' active-pick':'')+(h?' filled':'');
  if(h){
    var img=h.img?'<img class="slot-img" src="'+h.img+'">':'<span class="slot-emoji">'+(h.emoji||'?')+'</span>';
    var s1=h.s1?'<img class="skill-ic" src="'+h.s1+'">':'<div class="skill-ic-e"></div>';
    var s2=h.s2?'<img class="skill-ic" src="'+h.s2+'">':'<div class="skill-ic-e"></div>';
    return '<div class="'+cls+'"><div class="sbar tb-'+h.type+'"></div>'+img+'<span class="slot-name">'+xe(h.name)+'</span><div class="slot-skills">'+s1+s2+'</div><div class="srm" onclick="event.stopPropagation();rmSlot(\''+deckId+'\',\'atk\','+si+','+ai+')">✕</div></div>';
  }
  return '<div class="'+cls+'" onclick="startPick(\''+deckId+'\',\'atk\','+si+','+ai+')"><span class="slot-add">+</span></div>';
}

// ── DECK ACTIONS ─────────────────────────────────────────────
function toggleDeck(id){var d=decks.find(function(x){return x.id===id;});if(d){d.expanded=!d.expanded;persist();renderDecks();}}
function renameDeck(id,val){var d=decks.find(function(x){return x.id===id;});if(d){d.name=val;persist();}}
function noteDeck(id,val){var d=decks.find(function(x){return x.id===id;});if(d){d.note=val;persist();}}
function delDeck(id){
  if(!confirm('이 방어덱을 삭제할까요?'))return;
  decks=decks.filter(function(x){return x.id!==id;});
  if(pick&&pick.deckId===id)cancelPick();
  persist();renderDecks();renderHeroList();
}
function addDeck(){
  var id='dk'+Date.now();
  decks.push({id:id,name:'방어덱 '+(decks.length+1),def:[null,null,null],atks:[[null,null,null]],skillOrder:[null,null,null],pet:null,note:'',expanded:true});
  persist();renderDecks();
  setTimeout(function(){var el=document.getElementById('dk-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}
function addAtkDeck(deckId){var d=decks.find(function(x){return x.id===deckId;});if(!d)return;d.atks.push([null,null,null]);persist();renderDecks();}
function delAtkDeck(deckId,ai){
  var d=decks.find(function(x){return x.id===deckId;});if(!d||d.atks.length<=1)return;
  if(pick&&pick.deckId===deckId&&pick.mode==='atk'&&pick.atkIdx===ai)cancelPick();
  d.atks.splice(ai,1);persist();renderDecks();renderHeroList();
}

// ── PICK: HERO ───────────────────────────────────────────────
function startPick(deckId,mode,slotIdx,atkIdx){
  pick={deckId:deckId,mode:mode,slotIdx:slotIdx,atkIdx:atkIdx};
  var d=decks.find(function(x){return x.id===deckId;});
  var label=mode==='def'?'방어 슬롯 '+(slotIdx+1):'공격덱 '+(atkIdx+1)+' 슬롯 '+(slotIdx+1);
  document.getElementById('pick-hint').className='pick-hint show '+(mode==='atk'?'atk':'def');
  document.getElementById('pick-hint-text').textContent='['+(d?d.name:deckId)+'] '+label;
  showHeroSide();renderDecks();renderHeroList();
}
function cancelPick(){
  pick=null;document.getElementById('pick-hint').className='pick-hint';
  showHeroSide();renderDecks();renderHeroList();
}
function assignHero(heroId){
  if(!pick||pick.mode==='skill'||pick.mode==='pet'){showToast('먼저 슬롯을 클릭하세요');return;}
  var deck=decks.find(function(x){return x.id===pick.deckId;});if(!deck)return;
  var arr=pick.mode==='def'?deck.def:deck.atks[pick.atkIdx];
  if(arr.indexOf(heroId)!==-1){showToast('같은 덱에 이미 배치됨');return;}
  arr[pick.slotIdx]=heroId;
  var next=-1;for(var i=0;i<arr.length;i++){if(arr[i]===null){next=i;break;}}
  if(next!==-1){
    pick.slotIdx=next;
    var label=pick.mode==='def'?'방어 슬롯 '+(next+1):'공격덱 '+(pick.atkIdx+1)+' 슬롯 '+(next+1);
    document.getElementById('pick-hint-text').textContent='['+deck.name+'] '+label;
  } else {pick=null;document.getElementById('pick-hint').className='pick-hint';}
  persist();renderDecks();renderHeroList();
}
function rmSlot(deckId,mode,si,ai){
  var d=decks.find(function(x){return x.id===deckId;});if(!d)return;
  if(mode==='def')d.def[si]=null;else d.atks[ai][si]=null;
  persist();renderDecks();renderHeroList();
}

// ── PICK: SKILL ──────────────────────────────────────────────
function startSkillPick(deckId,slotIdx){
  pick={deckId:deckId,mode:'skill',slotIdx:slotIdx};
  var d=decks.find(function(x){return x.id===deckId;});
  document.getElementById('pick-hint').className='pick-hint show skill';
  document.getElementById('pick-hint-text').textContent='['+(d?d.name:deckId)+'] 스킬순서 '+(slotIdx+1)+' — 영웅 스킬 클릭';
  showHeroSide();renderDecks();renderHeroList();
}
function assignSkill(heroId,skillNum){
  if(!pick||pick.mode!=='skill')return;
  var deck=decks.find(function(x){return x.id===pick.deckId;});if(!deck)return;
  if(deck.def.indexOf(heroId)===-1){showToast('방어 슬롯에 배치된 영웅만 선택 가능');return;}
  deck.skillOrder[pick.slotIdx]={heroId:heroId,skillNum:skillNum};
  var next=-1;for(var i=0;i<deck.skillOrder.length;i++){if(!deck.skillOrder[i]){next=i;break;}}
  if(next!==-1){pick.slotIdx=next;document.getElementById('pick-hint-text').textContent='['+deck.name+'] 스킬순서 '+(next+1)+' — 영웅 스킬 클릭';}
  else{pick=null;document.getElementById('pick-hint').className='pick-hint';}
  persist();renderDecks();renderHeroList();
}
function rmSkillOrder(deckId,i){var d=decks.find(function(x){return x.id===deckId;});if(!d)return;d.skillOrder[i]=null;persist();renderDecks();}

// ── PICK: PET ────────────────────────────────────────────────
function startPetPick(deckId){
  pick={deckId:deckId,mode:'pet'};
  var d=decks.find(function(x){return x.id===deckId;});
  document.getElementById('pick-hint').className='pick-hint show pet-mode';
  document.getElementById('pick-hint-text').textContent='['+(d?d.name:deckId)+'] 펫 선택';
  showPetSide();renderDecks();renderPetList();
}
function assignPet(petId){
  if(!pick||pick.mode!=='pet')return;
  var deck=decks.find(function(x){return x.id===pick.deckId;});if(!deck)return;
  deck.pet=petId;pick=null;
  document.getElementById('pick-hint').className='pick-hint';
  persist();renderDecks();showHeroSide();renderHeroList();
}
function rmPet(deckId){var d=decks.find(function(x){return x.id===deckId;});if(!d)return;d.pet=null;persist();renderDecks();}

// ── SIDE PANEL ───────────────────────────────────────────────
function showHeroSide(){document.getElementById('side-hero-section').style.display='';document.getElementById('side-pet-section').style.display='none';}
function showPetSide(){document.getElementById('side-hero-section').style.display='none';document.getElementById('side-pet-section').style.display='';}
function setFilter(f,el){heroFilter=f;document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');renderHeroList();}

function renderHeroList(){
  var q=(document.getElementById('side-search').value||'').toLowerCase();
  var defUsed=defUsedSet(),atkUsed=atkUsedSet();
  var isSkill=pick&&pick.mode==='skill';
  var list=heroes.filter(function(h){
    if(heroFilter!=='전체'&&h.type!==heroFilter)return false;
    if(q&&h.name.toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  var html=list.map(function(h){
    var dimmed=false;
    if(pick&&(pick.mode==='def'||pick.mode==='atk')){
      var arr=pick.mode==='def'?(decks.find(function(d){return d.id===pick.deckId;})||{}).def||[]:(decks.find(function(d){return d.id===pick.deckId;})||{}).atks[pick.atkIdx]||[];
      if(arr.indexOf(h.id)!==-1)dimmed=true;
    }
    if(isSkill){var dk=decks.find(function(d){return d.id===pick.deckId;});if(!dk||dk.def.indexOf(h.id)===-1)dimmed=true;}
    var hl='';
    if(!dimmed&&pick){if(pick.mode==='atk')hl=' hl-atk';else if(pick.mode==='def')hl=' hl-def';else if(isSkill)hl=' hl-skill';}
    var defB=defUsed.has(h.id)?'<div class="in-def-badge">방어</div>':'';
    var atkB=atkUsed.has(h.id)?'<div class="in-atk-badge">공격</div>':'';
    var skillHtml='';
    if(isSkill&&!dimmed){
      var s1=h.s1?'<img class="cc-skill" src="'+h.s1+'" onclick="event.stopPropagation();assignSkill(\''+h.id+'\',1)">':'<div class="cc-skill-empty"></div>';
      var s2=h.s2?'<img class="cc-skill" src="'+h.s2+'" onclick="event.stopPropagation();assignSkill(\''+h.id+'\',2)">':'<div class="cc-skill-empty"></div>';
      skillHtml='<div class="char-card-skills">'+s1+s2+'</div>';
    }
    return '<div class="char-card'+(dimmed?' dimmed':hl)+'" onclick="'+(isSkill?'':'assignHero(\''+h.id+'\')')+'">'+heroThumb(h,52)+defB+atkB+'<div class="cname">'+xe(h.name)+'</div><div class="ctype type-'+h.type+'">'+h.type+'</div>'+skillHtml+'</div>';
  }).join('');
  document.getElementById('char-list').innerHTML=html;
}

function renderPetList(){
  var html=pets.map(function(p){
    return '<div class="pet-card hl-pet" onclick="assignPet(\''+p.id+'\')"><div class="pimg">'+(p.img?'<img src="'+p.img+'">':'<span style="font-size:22px">🐾</span>')+'</div><div class="pname">'+xe(p.name)+'</div></div>';
  }).join('');
  document.getElementById('pet-list').innerHTML=html||'<div style="color:var(--text3);font-size:12px;padding:8px 0">등록된 펫이 없어요.<br>상단 🐾 펫 관리를 눌러 추가하세요.</div>';
}

// ── HERO MODAL ───────────────────────────────────────────────
function openHeroModal(){cancelHeroEdit();document.getElementById('modal-hero').classList.add('open');renderModalHeroes();}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function handleHeroImg(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){pendingHeroImg=ev.target.result;var p=document.getElementById('img-preview');p.src=pendingHeroImg;p.style.display='block';document.getElementById('img-hint').style.display='none';};r.readAsDataURL(f);}
function handleSkillImg(e,num){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){if(num===1){pendingSkill1=ev.target.result;var p=document.getElementById('skill1-preview');p.src=pendingSkill1;p.style.display='block';document.getElementById('skill1-hint').style.display='none';}else{pendingSkill2=ev.target.result;var p=document.getElementById('skill2-preview');p.src=pendingSkill2;p.style.display='block';document.getElementById('skill2-hint').style.display='none';}};r.readAsDataURL(f);}
function saveHero(){
  var name=document.getElementById('h-name').value.trim();if(!name){showToast('이름을 입력하세요');return;}
  var type=document.getElementById('h-type').value,rarity=document.getElementById('h-rarity').value,emoji=document.getElementById('h-emoji').value||'⚔';
  if(editHeroId){var h=heroes.find(function(x){return x.id===editHeroId;});if(h){h.name=name;h.type=type;h.rarity=rarity;h.emoji=emoji;if(pendingHeroImg)h.img=pendingHeroImg;if(pendingSkill1)h.s1=pendingSkill1;if(pendingSkill2)h.s2=pendingSkill2;}showToast('수정됨');}
  else{heroes.push({id:'c'+Date.now(),name:name,type:type,rarity:rarity,emoji:emoji,img:pendingHeroImg,s1:pendingSkill1,s2:pendingSkill2});showToast(name+' 추가됨');}
  cancelHeroEdit();persist();renderHeroList();renderModalHeroes();
}
function editHero(id){
  var h=heroes.find(function(x){return x.id===id;});if(!h)return;
  editHeroId=id;pendingHeroImg='';pendingSkill1='';pendingSkill2='';
  document.getElementById('modal-hero-title').textContent='영웅 수정';
  document.getElementById('h-name').value=h.name;document.getElementById('h-type').value=h.type;document.getElementById('h-rarity').value=h.rarity;document.getElementById('h-emoji').value=h.emoji||'';
  function si(pid,src,hid){if(src){var p=document.getElementById(pid);p.src=src;p.style.display='block';document.getElementById(hid).style.display='none';}else{document.getElementById(pid).style.display='none';document.getElementById(hid).style.display='';}}
  si('img-preview',h.img,'img-hint');si('skill1-preview',h.s1,'skill1-hint');si('skill2-preview',h.s2,'skill2-hint');
  document.getElementById('btn-cancel-edit').style.display='';document.getElementById('h-name').focus();
}
function cancelHeroEdit(){
  editHeroId=null;pendingHeroImg='';pendingSkill1='';pendingSkill2='';
  document.getElementById('modal-hero-title').textContent='영웅 추가';
  document.getElementById('h-name').value='';document.getElementById('h-type').value='공격형';document.getElementById('h-rarity').value='legendary';document.getElementById('h-emoji').value='';
  ['img-preview','skill1-preview','skill2-preview'].forEach(function(id){document.getElementById(id).style.display='none';});
  ['img-hint','skill1-hint','skill2-hint'].forEach(function(id){document.getElementById(id).style.display='';});
  ['hero-img-file','skill1-file','skill2-file'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('btn-cancel-edit').style.display='none';
}
function delHero(id){
  var h=heroes.find(function(x){return x.id===id;});if(!h||!confirm('['+h.name+'] 삭제할까요?'))return;
  decks.forEach(function(d){d.def=d.def.map(function(x){return x===id?null:x;});d.atks.forEach(function(a){for(var i=0;i<a.length;i++){if(a[i]===id)a[i]=null;}});d.skillOrder=d.skillOrder.map(function(so){return(so&&so.heroId===id)?null:so;});});
  heroes=heroes.filter(function(x){return x.id!==id;});
  persist();render();renderModalHeroes();
}
function renderModalHeroes(){
  document.getElementById('modal-char-grid').innerHTML=heroes.map(function(h){
    return '<div style="position:relative;text-align:center;cursor:pointer" onclick="editHero(\''+h.id+'\')">'
      +heroThumb(h,44)+'<div style="font-size:9px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+xe(h.name)+'</div>'
      +'<div onclick="event.stopPropagation();delHero(\''+h.id+'\')" style="position:absolute;top:0;right:0;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer">✕</div>'
      +'</div>';
  }).join('');
}

// ── PET MODAL ────────────────────────────────────────────────
function openPetModal(){cancelPetEdit();document.getElementById('modal-pet').classList.add('open');renderModalPets();}
function handlePetImg(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){pendingPetImg=ev.target.result;var p=document.getElementById('pet-img-preview');p.src=pendingPetImg;p.style.display='block';document.getElementById('pet-img-hint').style.display='none';};r.readAsDataURL(f);}
function savePet(){
  var name=document.getElementById('p-name').value.trim();if(!name){showToast('이름을 입력하세요');return;}
  if(editPetId){var p=pets.find(function(x){return x.id===editPetId;});if(p){p.name=name;if(pendingPetImg)p.img=pendingPetImg;}showToast('펫 수정됨');}
  else{pets.push({id:'p'+Date.now(),name:name,img:pendingPetImg});showToast(name+' 추가됨');}
  cancelPetEdit();persist();renderPetList();renderModalPets();
}
function editPet(id){
  var p=pets.find(function(x){return x.id===id;});if(!p)return;
  editPetId=id;pendingPetImg='';
  document.getElementById('modal-pet-title').textContent='펫 수정';document.getElementById('p-name').value=p.name;
  if(p.img){var prev=document.getElementById('pet-img-preview');prev.src=p.img;prev.style.display='block';document.getElementById('pet-img-hint').style.display='none';}
  else{document.getElementById('pet-img-preview').style.display='none';document.getElementById('pet-img-hint').style.display='';}
  document.getElementById('btn-cancel-pet-edit').style.display='';
}
function cancelPetEdit(){
  editPetId=null;pendingPetImg='';
  document.getElementById('modal-pet-title').textContent='펫 추가';document.getElementById('p-name').value='';
  document.getElementById('pet-img-preview').style.display='none';document.getElementById('pet-img-hint').style.display='';
  document.getElementById('pet-img-file').value='';document.getElementById('btn-cancel-pet-edit').style.display='none';
}
function delPet(id){
  if(!confirm('펫을 삭제할까요?'))return;
  decks.forEach(function(d){if(d.pet===id)d.pet=null;});
  pets=pets.filter(function(x){return x.id!==id;});
  persist();renderPetList();renderModalPets();renderDecks();
}
function renderModalPets(){
  document.getElementById('modal-pet-grid').innerHTML=pets.map(function(p){
    return '<div style="position:relative;text-align:center;cursor:pointer" onclick="editPet(\''+p.id+'\')">'
      +'<div class="pimg" style="width:44px;height:44px;border-radius:7px;margin:0 auto 2px">'+(p.img?'<img src="'+p.img+'" style="width:100%;height:100%;object-fit:cover">':'<span style="font-size:20px">🐾</span>')+'</div>'
      +'<div style="font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+xe(p.name)+'</div>'
      +'<div onclick="event.stopPropagation();delPet(\''+p.id+'\')" style="position:absolute;top:0;right:0;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer">✕</div>'
      +'</div>';
  }).join('')||'<div style="color:var(--text3);font-size:12px;padding:4px;grid-column:1/-1">아직 펫이 없어요</div>';
}

function xe(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1800);}
function render(){renderDecks();renderHeroList();}
window.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
