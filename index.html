<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세나 리버스 - 길드전 배치툴</title>
<style>
:root{
  --bg:#0d0f1a;--bg2:#161929;--bg3:#1e2236;--card:#1a1d2e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#e8b84b;--gold2:#f5d080;--red:#e05555;--green:#45b87a;
  --purple:#9b6fe0;--blue:#4a8fe0;--text:#e8eaf0;--text2:#9aa0b8;--text3:#6a708a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;}

.header{background:linear-gradient(180deg,#0a0c18,var(--bg));border-bottom:1px solid var(--border2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0d0f1a;}
.logo-text{font-size:15px;font-weight:600;}
.logo-sub{font-size:11px;color:var(--text3);}
.hbtns{display:flex;gap:8px;}

.wrap{display:grid;grid-template-columns:1fr 296px;min-height:calc(100vh - 56px);}
.main-area{padding:20px;border-right:1px solid var(--border);overflow-y:auto;}
.side-panel{padding:16px;overflow-y:auto;background:var(--bg2);}
@media(max-width:940px){.wrap{grid-template-columns:1fr;}.side-panel{border-top:1px solid var(--border);}}

.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-gold{background:var(--gold);color:#0d0f1a;}.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}.btn-ghost:hover{background:var(--bg3);}
.btn-red{background:rgba(224,85,85,.18);color:var(--red);border:1px solid rgba(224,85,85,.3);}.btn-red:hover{background:rgba(224,85,85,.28);}
.btn-sm{padding:4px 10px;font-size:11px;}.btn-xs{padding:3px 8px;font-size:10px;}

.sec-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}



/* DECK ROW */
.deck-row{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;transition:border-color .15s;}
.deck-row.expanded{border-color:var(--border2);}
.deck-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;}
.deck-header:hover{background:rgba(255,255,255,.02);}
.deck-chevron{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;width:14px;}
.deck-row.expanded .deck-chevron{transform:rotate(90deg);}
.deck-title-wrap{flex:1;min-width:0;}
.deck-name-input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-weight:600;width:100%;cursor:text;border-bottom:1px solid transparent;transition:border-color .15s;}
.deck-name-input:hover{border-bottom-color:rgba(255,255,255,.15);}
.deck-name-input:focus{border-bottom-color:var(--gold);}
.deck-name-input::placeholder{color:var(--text3);}
.deck-meta{font-size:10px;color:var(--text3);margin-top:2px;}
.deck-preview{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.prev-slot{width:30px;height:36px;border-radius:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.prev-slot img{width:100%;height:100%;object-fit:cover;}
.prev-slot .pe{font-size:14px;}
.badge-def{background:rgba(224,85,85,.2);color:var(--red);border:1px solid rgba(224,85,85,.35);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px;}

.deck-body{padding:0 14px 14px;display:none;}
.deck-row.expanded .deck-body{display:block;}
.deck-body-top{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:flex-start;}
@media(max-width:600px){.deck-body-top{grid-template-columns:1fr;}}
.slots-label{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--text3);margin-bottom:8px;}
.slots-row{display:flex;gap:8px;}
.atk-section{flex:1;}
.atk-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.atk-section-label{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--text3);}
.atk-deck-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:rgba(69,184,122,.03);border:1px solid rgba(69,184,122,.1);border-radius:10px;}
.atk-deck-num{font-size:9px;color:var(--text3);font-weight:600;width:14px;flex-shrink:0;}
.atk-deck-slots{display:flex;gap:6px;}
.atk-deck-del{width:22px;height:22px;border-radius:6px;background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;margin-left:auto;transition:all .15s;}
.atk-deck-del:hover{background:rgba(224,85,85,.3);}
.add-atk-btn{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);cursor:pointer;padding:6px 10px;border:1px dashed rgba(69,184,122,.3);border-radius:8px;background:transparent;transition:all .15s;font-weight:600;}
.add-atk-btn:hover{background:rgba(69,184,122,.06);border-color:rgba(69,184,122,.5);}

/* SLOT */
.slot,.aslot{width:68px;height:84px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;flex-shrink:0;}
.slot{background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);}
.slot:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);}
.slot.filled{border-style:solid;border-color:rgba(255,255,255,.12);}
.slot.active-pick{border-color:var(--gold)!important;background:rgba(232,184,75,.08)!important;box-shadow:0 0 0 1px var(--gold);}
.aslot{background:rgba(69,184,122,.04);border:1px dashed rgba(69,184,122,.2);}
.aslot:hover{border-color:rgba(69,184,122,.4);}
.aslot.filled{border-style:solid;border-color:rgba(69,184,122,.2);background:rgba(69,184,122,.05);}
.aslot.active-pick{border-color:var(--green)!important;background:rgba(69,184,122,.1)!important;box-shadow:0 0 0 1px var(--green);}
.slot img,.aslot img{width:100%;height:68px;object-fit:cover;}
.sn{font-size:8px;color:var(--text2);text-align:center;padding:0 2px;line-height:1.2;max-width:66px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.se{font-size:24px;line-height:1;margin-bottom:2px;}
.sa{font-size:22px;color:rgba(255,255,255,.18);}
.srm{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#fff;line-height:1;}
.slot:hover .srm,.aslot:hover .srm{display:flex;}
.sbar{position:absolute;bottom:0;left:0;right:0;height:3px;}

.deck-note-wrap{margin-top:10px;}
.deck-note-wrap textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:12px;padding:8px 10px;outline:none;resize:vertical;min-height:50px;font-family:inherit;}
.deck-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}

.add-deck-btn{border:1px dashed var(--border2);border-radius:12px;padding:14px;text-align:center;cursor:pointer;color:var(--text3);font-size:13px;transition:all .15s;margin-bottom:20px;}
.add-deck-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(232,184,75,.04);}

/* SIDE */
.side-search{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px;}
.side-search::placeholder{color:var(--text3);}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.ftab{font-size:10px;padding:3px 8px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;}
.ftab.on{background:var(--gold);color:#0d0f1a;border-color:var(--gold);font-weight:600;}
.char-list{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.char-card{background:var(--bg3);border-radius:8px;padding:6px 4px 5px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.char-card:hover{border-color:var(--gold);background:rgba(232,184,75,.06);}
.char-card.dimmed{opacity:.35;pointer-events:none;}
.char-card.hl-atk{border-color:rgba(69,184,122,.5);background:rgba(69,184,122,.06);}
.char-card.hl-def{border-color:rgba(232,184,75,.5);background:rgba(232,184,75,.06);}
.cimg{width:52px;height:52px;border-radius:7px;margin:0 auto 4px;overflow:hidden;position:relative;}
.cimg img{width:100%;height:100%;object-fit:cover;}
.cimge{font-size:24px;line-height:52px;display:block;text-align:center;}
.crbar{position:absolute;bottom:0;left:0;right:0;height:3px;}
.rarity-legendary{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.rarity-epic{background:linear-gradient(90deg,var(--purple),#b088f0);}
.rarity-rare{background:linear-gradient(90deg,var(--blue),#6aaaf5);}
.cname{font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctype{font-size:8px;margin-top:1px;}
.type-공격형{color:#e05555;}.type-마법형{color:#6aaaf5;}.type-지원형{color:#45b87a;}.type-방어형{color:#e8b84b;}.type-만능형{color:#9b6fe0;}
.av-공격형{background:rgba(224,85,85,.15);}.av-마법형{background:rgba(106,170,245,.15);}.av-지원형{background:rgba(69,184,122,.15);}.av-방어형{background:rgba(232,184,75,.15);}.av-만능형{background:rgba(155,111,224,.15);}
.tb-공격형{background:linear-gradient(90deg,#e05555,#f07070);}.tb-마법형{background:linear-gradient(90deg,#4a8fe0,#6aaaf5);}.tb-지원형{background:linear-gradient(90deg,#45b87a,#6dd49a);}.tb-방어형{background:linear-gradient(90deg,#e8b84b,#f5d080);}.tb-만능형{background:linear-gradient(90deg,#9b6fe0,#b088f0);}
.in-def-badge{position:absolute;top:2px;left:2px;font-size:7px;background:rgba(224,85,85,.75);color:#fff;padding:1px 4px;border-radius:3px;line-height:1.4;}
.in-atk-badge{position:absolute;top:2px;right:2px;font-size:7px;background:rgba(69,184,122,.75);color:#fff;padding:1px 4px;border-radius:3px;line-height:1.4;}

.pick-hint{background:rgba(232,184,75,.1);border:1px solid rgba(232,184,75,.3);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--gold);margin-bottom:12px;display:none;align-items:center;justify-content:space-between;gap:8px;}
.pick-hint.show{display:flex;}
.pick-hint.atk{background:rgba(69,184,122,.1);border-color:rgba(69,184,122,.3);color:var(--green);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:440px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-head h3{font-size:14px;font-weight:600;}
.modal-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:0;}
.modal-body{padding:16px;overflow-y:auto;}
.form-field{margin-bottom:12px;}
.form-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;letter-spacing:.04em;}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.frow{display:flex;gap:8px;}.frow .form-field{flex:1;}

.img-upload-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.img-box{width:90px;height:90px;flex-shrink:0;border-radius:10px;border:1px dashed var(--border2);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.img-box:hover{border-color:var(--gold);}
.img-box img{width:100%;height:100%;object-fit:cover;display:none;}
.img-box .uh{font-size:10px;color:var(--text3);text-align:center;padding:4px;pointer-events:none;}
.img-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}

.modal-char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">7K</div>
    <div>
      <div class="logo-text">길드전 배치툴</div>
      <div class="logo-sub">세븐나이츠 리버스</div>
    </div>
  </div>
  <div class="hbtns">
    <button class="btn btn-ghost btn-sm" onclick="doSave()">💾 저장</button>
    <button class="btn btn-ghost btn-sm" onclick="doReset()">초기화</button>
    <button class="btn btn-gold btn-sm" onclick="openHeroModal()">+ 영웅 추가</button>
  </div>
</div>

<div class="wrap">
  <div class="main-area">

    <div class="sec-title">방어덱 목록</div>
    <div id="decks-container"></div>
    <div class="add-deck-btn" onclick="addDeck()">＋ 방어덱 추가</div>
  </div>

  <div class="side-panel">
    <div class="pick-hint" id="pick-hint">
      <span id="pick-hint-text">슬롯을 선택하세요</span>
      <button class="btn btn-ghost btn-xs" onclick="cancelPick()">취소</button>
    </div>
    <div class="sec-title">영웅 목록</div>
    <input class="side-search" type="text" id="side-search" placeholder="영웅 검색..." oninput="renderHeroList()">
    <div class="filter-row">
      <div class="ftab on" onclick="setFilter('전체',this)">전체</div>
      <div class="ftab" onclick="setFilter('공격형',this)">공격형</div>
      <div class="ftab" onclick="setFilter('마법형',this)">마법형</div>
      <div class="ftab" onclick="setFilter('지원형',this)">지원형</div>
      <div class="ftab" onclick="setFilter('방어형',this)">방어형</div>
      <div class="ftab" onclick="setFilter('만능형',this)">만능형</div>
    </div>
    <div class="char-list" id="char-list"></div>
  </div>
</div>

<!-- HERO MODAL -->
<div class="modal-overlay" id="modal-hero">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-hero-title">영웅 추가</h3>
      <button class="modal-close" onclick="closeModal('modal-hero')">✕</button>
    </div>
    <div class="modal-body">
      <div class="img-upload-row">
        <div class="img-box" id="img-box" onclick="document.getElementById('hero-img-file').click()">
          <img id="img-preview">
          <div class="uh" id="img-hint">📷<br>이미지<br>업로드</div>
          <input type="file" id="hero-img-file" accept="image/*" onchange="handleImg(event)">
        </div>
        <div style="flex:1">
          <div class="form-field">
            <label>영웅 이름</label>
            <input type="text" id="h-name" placeholder="이름 입력" onkeydown="if(event.key==='Enter')saveHero()">
          </div>
          <div class="frow">
            <div class="form-field">
              <label>타입</label>
              <select id="h-type">
                <option value="공격형">공격형</option>
                <option value="마법형">마법형</option>
                <option value="지원형">지원형</option>
                <option value="방어형">방어형</option>
                <option value="만능형">만능형</option>
              </select>
            </div>
            <div class="form-field">
              <label>등급</label>
              <select id="h-rarity">
                <option value="legendary">전설</option>
                <option value="epic">에픽</option>
                <option value="rare">희귀</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="form-field">
        <label>이모지 (이미지 없을 때 대체 표시)</label>
        <input type="text" id="h-emoji" placeholder="예: ⚔ 🔥 🛡 (선택 사항)" maxlength="2">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gold" style="flex:1" onclick="saveHero()">저장하기</button>
        <button class="btn btn-ghost btn-sm" id="btn-cancel-edit" style="display:none" onclick="cancelEdit()">취소</button>
      </div>

      <div style="margin-top:16px;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">등록된 영웅 — 클릭하여 수정</div>
      <div class="modal-char-grid" id="modal-char-grid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var heroes = JSON.parse(localStorage.getItem('sk2_heroes') || 'null') || [
  {id:'taeo',name:'태오',type:'만능형',rarity:'legendary',emoji:'⚔',img:''},
  {id:'yeonhui',name:'연희',type:'마법형',rarity:'legendary',emoji:'🔥',img:''},
  {id:'pascal',name:'파스칼',type:'공격형',rarity:'legendary',emoji:'💥',img:''},
  {id:'rachel',name:'레이첼',type:'지원형',rarity:'legendary',emoji:'✨',img:''},
  {id:'rody',name:'로디',type:'방어형',rarity:'legendary',emoji:'🛡',img:''},
  {id:'pia',name:'피에이',type:'마법형',rarity:'legendary',emoji:'🌀',img:''},
  {id:'knox',name:'녹스',type:'마법형',rarity:'legendary',emoji:'🌑',img:''},
  {id:'ace',name:'에이스',type:'만능형',rarity:'legendary',emoji:'⚡',img:''},
  {id:'evan',name:'에반',type:'공격형',rarity:'epic',emoji:'🗡',img:''},
  {id:'karin',name:'카린',type:'지원형',rarity:'epic',emoji:'🌿',img:''},
  {id:'jeib',name:'제이브',type:'마법형',rarity:'legendary',emoji:'🔮',img:''},
  {id:'vanessa',name:'바네사',type:'공격형',rarity:'legendary',emoji:'🏹',img:''},
  {id:'li',name:'리',type:'공격형',rarity:'legendary',emoji:'👊',img:''},
  {id:'yui',name:'유이',type:'지원형',rarity:'epic',emoji:'💚',img:''},
  {id:'cleo',name:'클레오',type:'마법형',rarity:'epic',emoji:'🌙',img:''},
  {id:'dellons',name:'델론스',type:'공격형',rarity:'legendary',emoji:'🌑',img:''},
  {id:'linzy',name:'린지',type:'공격형',rarity:'legendary',emoji:'💨',img:''},
  {id:'ruina',name:'루이나',type:'마법형',rarity:'legendary',emoji:'❄',img:''},
  {id:'spike',name:'스파이크',type:'방어형',rarity:'legendary',emoji:'🛡',img:''},
  {id:'kei',name:'케이',type:'만능형',rarity:'legendary',emoji:'🔱',img:''},
  {id:'elena',name:'엘레나',type:'지원형',rarity:'legendary',emoji:'💫',img:''},
  {id:'trud',name:'트루드',type:'공격형',rarity:'legendary',emoji:'⚔',img:''},
  {id:'ryan',name:'라이언',type:'공격형',rarity:'legendary',emoji:'⚡',img:''},
  {id:'chosun',name:'초선',type:'마법형',rarity:'legendary',emoji:'🌸',img:''},
  {id:'songoku',name:'손오공',type:'방어형',rarity:'legendary',emoji:'🌪',img:''},
  {id:'milia',name:'밀리아',type:'마법형',rarity:'legendary',emoji:'💎',img:''},
  {id:'rudy',name:'루디',type:'공격형',rarity:'epic',emoji:'⚔',img:''},
];

var decks = JSON.parse(localStorage.getItem('sk2_decks') || 'null') || [
  {id:'d1',name:'방어덱 1',def:[null,null,null],atks:[[null,null,null]],note:'',expanded:false},
  {id:'d2',name:'방어덱 2',def:[null,null,null],atks:[[null,null,null]],note:'',expanded:false},
  {id:'d3',name:'방어덱 3',def:[null,null,null],atks:[[null,null,null]],note:'',expanded:false},
];
// 구버전 호환: atk → atks 마이그레이션
decks.forEach(function(d){
  if(!d.atks){ d.atks = [d.atk||[null,null,null]]; delete d.atk; }
});

var pick = null;   // {deckId, mode:'def'|'atk', slotIdx}
var heroFilter = '전체';
var editHeroId = null;
var pendingImg = '';

function persist(){
  localStorage.setItem('sk2_heroes', JSON.stringify(heroes));
  localStorage.setItem('sk2_decks',  JSON.stringify(decks));
}
function doSave(){ persist(); showToast('저장됨'); }
function doReset(){
  if(!confirm('모든 배치를 초기화할까요?')) return;
  decks.forEach(function(d){ d.def=[null,null,null]; d.atks=[[null,null,null]]; });
  persist(); render(); showToast('초기화됨');
}

function getHero(id){ return heroes.find(function(h){ return h.id===id; }); }
function defUsedSet(){ var s=new Set(); decks.forEach(function(d){ d.def.forEach(function(x){ if(x)s.add(x); }); }); return s; }
function atkUsedSet(){ var s=new Set(); decks.forEach(function(d){ (d.atks||[]).forEach(function(atk){ atk.forEach(function(x){ if(x)s.add(x); }); }); }); return s; }

function heroImg(h, size){
  size = size||52;
  if(!h) return '<div style="width:'+size+'px;height:'+size+'px;border-radius:7px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:'+(size*.5)+'px">?</div>';
  if(h.img){
    return '<div class="cimg" style="width:'+size+'px;height:'+size+'px;"><img src="'+h.img+'" loading="lazy"><div class="crbar rarity-'+h.rarity+'"></div></div>';
  }
  return '<div class="cimg av-'+h.type+'" style="width:'+size+'px;height:'+size+'px;"><span class="cimge" style="font-size:'+(size*.46)+'px;line-height:'+size+'px">'+(h.emoji||'?')+'</span><div class="crbar rarity-'+h.rarity+'"></div></div>';
}

// ─── DECKS ──────────────────────────────────────────────────
function renderDecks(){
  var c = document.getElementById('decks-container');
  var html = '';
  decks.forEach(function(deck){
    var prevHtml = deck.def.map(function(hid){
      var h = hid ? getHero(hid) : null;
      return '<div class="prev-slot">'+(h ? (h.img ? '<img src="'+h.img+'">' : '<span class="pe">'+(h.emoji||'?')+'</span>') : '')+'</div>';
    }).join('');

    var defSlots = deck.def.map(function(hid,si){
      return makeSlot(deck.id,'def',si,hid);
    }).join('');

    // 카운터 공격덱 여러개
    var atksHtml = (deck.atks||[]).map(function(atk, ai){
      var slots = atk.map(function(hid,si){
        return makeAtkSlot(deck.id, ai, si, hid);
      }).join('');
      var delBtn = deck.atks.length > 1
        ? '<div class="atk-deck-del" onclick="delAtkDeck(\''+deck.id+'\','+ai+')" title="이 공격덱 삭제">✕</div>'
        : '';
      return '<div class="atk-deck-row">'
        +'<span class="atk-deck-num">'+(ai+1)+'</span>'
        +'<div class="atk-deck-slots">'+slots+'</div>'
        +delBtn
        +'</div>';
    }).join('');

    var totalAtk = (deck.atks||[]).reduce(function(s,a){ return s+a.filter(Boolean).length; },0);

    html += '<div class="deck-row'+(deck.expanded?' expanded':'')+'" id="dk-'+deck.id+'">';
    html += '<div class="deck-header" onclick="toggleDeck(\''+deck.id+'\')">';
    html += '<span class="deck-chevron">▶</span>';
    html += '<div class="deck-title-wrap">';
    html += '<input class="deck-name-input" value="'+xe(deck.name)+'" placeholder="덱 이름..." onclick="event.stopPropagation()" onchange="renameDeck(\''+deck.id+'\',this.value)" onblur="renameDeck(\''+deck.id+'\',this.value)">';
    html += '<div class="deck-meta">방어 '+deck.def.filter(Boolean).length+'/3 &nbsp;·&nbsp; 공격덱 '+(deck.atks||[]).length+'개 ('+totalAtk+' 영웅)</div>';
    html += '</div>';
    html += '<div class="deck-preview">'+prevHtml+'</div>';
    html += '</div>'; // deck-header

    html += '<div class="deck-body">';
    html += '<div class="deck-body-top">';
    // 방어 슬롯
    html += '<div><div class="slots-label">🔴 방어 슬롯</div><div class="slots-row">'+defSlots+'</div></div>';
    // 카운터 공격덱
    html += '<div class="atk-section">';
    html += '<div class="atk-section-header"><span class="atk-section-label">🟢 카운터 공격덱</span></div>';
    html += atksHtml;
    html += '<div class="add-atk-btn" onclick="addAtkDeck(\''+deck.id+'\')">＋ 공격덱 추가</div>';
    html += '</div>';
    html += '</div>'; // deck-body-top

    html += '<div class="deck-note-wrap"><textarea placeholder="메모 (공략 팁 등...)" onchange="noteDeck(\''+deck.id+'\',this.value)">'+xe(deck.note||'')+'</textarea></div>';
    html += '<div class="deck-actions">';
    html += '<button class="btn btn-red btn-sm" onclick="delDeck(\''+deck.id+'\')">🗑 덱 삭제</button>';
    html += '</div>';
    html += '</div>'; // deck-body
    html += '</div>'; // deck-row
  });
  c.innerHTML = html;
}

function makeSlot(deckId, mode, si, hid){
  var h = hid ? getHero(hid) : null;
  var isActive = pick && pick.deckId===deckId && pick.mode===mode && pick.slotIdx===si;
  var cls = 'slot' + (isActive?' active-pick':'') + (h?' filled':'');
  var rmFn = 'event.stopPropagation();rmSlot(\''+deckId+'\',\''+mode+'\','+si+',null)';
  if(h){
    var inner = h.img ? '<img src="'+h.img+'">' : '<span class="se">'+(h.emoji||'?')+'</span>';
    return '<div class="'+cls+'" onclick="">'
      +inner+'<span class="sn">'+xe(h.name)+'</span>'
      +'<div class="sbar tb-'+h.type+'"></div>'
      +'<div class="srm" onclick="'+rmFn+'">✕</div></div>';
  }
  return '<div class="'+cls+'" onclick="startPick(\''+deckId+'\',\'def\','+si+',null)"><span class="sa">+</span></div>';
}

function makeAtkSlot(deckId, ai, si, hid){
  var h = hid ? getHero(hid) : null;
  var isActive = pick && pick.deckId===deckId && pick.mode==='atk' && pick.atkIdx===ai && pick.slotIdx===si;
  var cls = 'aslot' + (isActive?' active-pick':'') + (h?' filled':'');
  var rmFn = 'event.stopPropagation();rmSlot(\''+deckId+'\',\'atk\','+si+','+ai+')';
  if(h){
    var inner = h.img ? '<img src="'+h.img+'">' : '<span class="se">'+(h.emoji||'?')+'</span>';
    return '<div class="'+cls+'" onclick="">'
      +inner+'<span class="sn">'+xe(h.name)+'</span>'
      +'<div class="sbar tb-'+h.type+'"></div>'
      +'<div class="srm" onclick="'+rmFn+'">✕</div></div>';
  }
  return '<div class="'+cls+'" onclick="startPick(\''+deckId+'\',\'atk\','+si+','+ai+')"><span class="sa">+</span></div>';
}

function toggleDeck(id){
  var d = decks.find(function(x){ return x.id===id; });
  if(d){ d.expanded=!d.expanded; persist(); renderDecks(); }
}
function renameDeck(id, val){
  var d = decks.find(function(x){ return x.id===id; });
  if(d){ d.name=val; persist(); }
}
function noteDeck(id, val){
  var d = decks.find(function(x){ return x.id===id; });
  if(d){ d.note=val; persist(); }
}
function toggleDefeated(id){
  var d = decks.find(function(x){ return x.id===id; });
  if(d){ d.defeated=!d.defeated; persist(); renderDecks(); updateStats(); }
}
function delDeck(id){
  if(!confirm('이 방어덱을 삭제할까요?')) return;
  decks = decks.filter(function(x){ return x.id!==id; });
  if(pick && pick.deckId===id) cancelPick();
  persist(); renderDecks(); updateStats(); renderHeroList();
}
function addDeck(){
  var id = 'dk'+Date.now();
  decks.push({id:id,name:'방어덱 '+(decks.length+1),def:[null,null,null],atks:[[null,null,null]],note:'',expanded:true});
  persist(); renderDecks(); updateStats();
  setTimeout(function(){ var el=document.getElementById('dk-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },80);
}

// ─── PICK ────────────────────────────────────────────────────
function startPick(deckId, mode, slotIdx, atkIdx){
  pick = {deckId:deckId, mode:mode, slotIdx:slotIdx, atkIdx:atkIdx};
  var d = decks.find(function(x){ return x.id===deckId; });
  var dname = d ? d.name : deckId;
  var hint = document.getElementById('pick-hint');
  var txt  = document.getElementById('pick-hint-text');
  hint.className = 'pick-hint show' + (mode==='atk' ? ' atk' : '');
  var label = mode==='def' ? '방어 슬롯 '+(slotIdx+1) : '공격덱 '+(atkIdx+1)+' 슬롯 '+(slotIdx+1);
  txt.textContent = '['+dname+'] '+label+' — 영웅을 선택하세요';
  renderDecks(); renderHeroList();
}
function cancelPick(){
  pick = null;
  document.getElementById('pick-hint').className='pick-hint';
  renderDecks(); renderHeroList();
}
function assignHero(heroId){
  if(!pick){ showToast('먼저 빈 슬롯을 클릭하세요'); return; }
  var deck = decks.find(function(x){ return x.id===pick.deckId; });
  if(!deck) return;
  var arr;
  if(pick.mode==='def'){
    arr = deck.def;
  } else {
    arr = deck.atks[pick.atkIdx];
  }
  if(arr.indexOf(heroId)!==-1){ showToast('같은 덱에 이미 배치된 영웅입니다'); return; }
  arr[pick.slotIdx] = heroId;
  // 다음 빈 슬롯으로 자동 이동
  var next = -1;
  for(var i=0;i<arr.length;i++){ if(arr[i]===null){ next=i; break; } }
  if(next!==-1){
    pick.slotIdx = next;
    var txt=document.getElementById('pick-hint-text');
    var label = pick.mode==='def' ? '방어 슬롯 '+(next+1) : '공격덱 '+(pick.atkIdx+1)+' 슬롯 '+(next+1);
    txt.textContent = '['+deck.name+'] '+label+' — 영웅을 선택하세요';
  } else {
    pick=null;
    document.getElementById('pick-hint').className='pick-hint';
  }
  persist(); renderDecks(); renderHeroList(); updateStats();
}
function rmSlot(deckId, mode, si, ai){
  var d = decks.find(function(x){ return x.id===deckId; });
  if(!d) return;
  if(mode==='def'){ d.def[si]=null; }
  else { d.atks[ai][si]=null; }
  persist(); renderDecks(); renderHeroList(); updateStats();
}
function addAtkDeck(deckId){
  var d = decks.find(function(x){ return x.id===deckId; });
  if(!d) return;
  d.atks.push([null,null,null]);
  persist(); renderDecks();
}
function delAtkDeck(deckId, ai){
  var d = decks.find(function(x){ return x.id===deckId; });
  if(!d || d.atks.length<=1) return;
  if(pick && pick.deckId===deckId && pick.mode==='atk' && pick.atkIdx===ai) cancelPick();
  d.atks.splice(ai,1);
  persist(); renderDecks(); renderHeroList();
}

// ─── HERO LIST ───────────────────────────────────────────────
function setFilter(f, el){
  heroFilter = f;
  document.querySelectorAll('.ftab').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  renderHeroList();
}
function renderHeroList(){
  var q = (document.getElementById('side-search').value||'').toLowerCase();
  var defUsed = defUsedSet();
  var atkUsed = atkUsedSet();
  var list = heroes.filter(function(h){
    if(heroFilter!=='전체' && h.type!==heroFilter) return false;
    if(q && h.name.toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
  var html = list.map(function(h){
    var inDef = defUsed.has(h.id);
    var inAtk = atkUsed.has(h.id);
    var dimmed = false;
    if(pick){
      var arr;
      if(pick.mode==='def'){
        arr = (decks.find(function(d){ return d.id===pick.deckId; })||{}).def||[];
      } else {
        var pd = decks.find(function(d){ return d.id===pick.deckId; });
        arr = pd ? (pd.atks[pick.atkIdx]||[]) : [];
      }
      if(arr.indexOf(h.id)!==-1) dimmed=true;
    }
    var hl = '';
    if(!dimmed && pick){
      hl = pick.mode==='atk' ? ' hl-atk' : ' hl-def';
    }
    var defBadge = inDef ? '<div class="in-def-badge">방어</div>' : '';
    var atkBadge = inAtk ? '<div class="in-atk-badge">공격</div>' : '';
    return '<div class="char-card'+(dimmed?' dimmed':hl)+'" onclick="assignHero(\''+h.id+'\')">'+heroImg(h,52)+defBadge+atkBadge+'<div class="cname">'+xe(h.name)+'</div><div class="ctype type-'+h.type+'">'+h.type+'</div></div>';
  }).join('');
  document.getElementById('char-list').innerHTML = html;
}

// ─── STATS ───────────────────────────────────────────────────
function updateStats(){}

// ─── HERO MODAL ──────────────────────────────────────────────
function openHeroModal(){
  cancelEdit();
  document.getElementById('modal-hero').classList.add('open');
  renderModalChars();
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function handleImg(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    pendingImg = ev.target.result;
    var prev = document.getElementById('img-preview');
    prev.src = pendingImg; prev.style.display='block';
    document.getElementById('img-hint').style.display='none';
  };
  reader.readAsDataURL(file);
}

function saveHero(){
  var name = document.getElementById('h-name').value.trim();
  if(!name){ showToast('이름을 입력하세요'); return; }
  var type   = document.getElementById('h-type').value;
  var rarity = document.getElementById('h-rarity').value;
  var emoji  = document.getElementById('h-emoji').value || '⚔';
  var img    = pendingImg;
  if(editHeroId){
    var h = heroes.find(function(x){ return x.id===editHeroId; });
    if(h){ h.name=name; h.type=type; h.rarity=rarity; h.emoji=emoji; if(img) h.img=img; }
    showToast('수정됨');
  } else {
    heroes.push({id:'c'+Date.now(),name:name,type:type,rarity:rarity,emoji:emoji,img:img});
    showToast(name+' 추가됨');
  }
  cancelEdit();
  persist(); renderHeroList(); renderModalChars(); updateStats();
}

function editHero(id){
  var h = heroes.find(function(x){ return x.id===id; });
  if(!h) return;
  editHeroId = id; pendingImg='';
  document.getElementById('modal-hero-title').textContent='영웅 수정';
  document.getElementById('h-name').value=h.name;
  document.getElementById('h-type').value=h.type;
  document.getElementById('h-rarity').value=h.rarity;
  document.getElementById('h-emoji').value=h.emoji||'';
  if(h.img){
    var p=document.getElementById('img-preview'); p.src=h.img; p.style.display='block';
    document.getElementById('img-hint').style.display='none';
  } else {
    document.getElementById('img-preview').style.display='none';
    document.getElementById('img-hint').style.display='';
  }
  document.getElementById('btn-cancel-edit').style.display='';
  document.getElementById('h-name').focus();
}

function cancelEdit(){
  editHeroId=null; pendingImg='';
  document.getElementById('modal-hero-title').textContent='영웅 추가';
  document.getElementById('h-name').value='';
  document.getElementById('h-type').value='공격형';
  document.getElementById('h-rarity').value='legendary';
  document.getElementById('h-emoji').value='';
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-hint').style.display='';
  document.getElementById('hero-img-file').value='';
  document.getElementById('btn-cancel-edit').style.display='none';
}

function delHero(id){
  var h = heroes.find(function(x){ return x.id===id; });
  if(!h||!confirm('['+h.name+'] 삭제할까요?')) return;
  decks.forEach(function(d){
    d.def=d.def.map(function(x){ return x===id?null:x; });
    d.atk=d.atk.map(function(x){ return x===id?null:x; });
  });
  heroes=heroes.filter(function(x){ return x.id!==id; });
  persist(); render(); renderModalChars();
}

function renderModalChars(){
  var html = heroes.map(function(h){
    return '<div style="position:relative;text-align:center;cursor:pointer" onclick="editHero(\''+h.id+'\')">'
      +heroImg(h,44)
      +'<div style="font-size:9px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+xe(h.name)+'</div>'
      +'<div onclick="event.stopPropagation();delHero(\''+h.id+'\')" style="position:absolute;top:0;right:0;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer">✕</div>'
      +'</div>';
  }).join('');
  document.getElementById('modal-char-grid').innerHTML = html;
}

function xe(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },1800);
}

function render(){ renderDecks(); renderHeroList(); updateStats(); }
window.addEventListener('DOMContentLoaded', render);
</script>
