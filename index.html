<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, onSnapshot, setDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBmRj-15DD3rwyBD10hKHP6cD5xTTzOCIw",
  authDomain: "sena-guild.firebaseapp.com",
  projectId: "sena-guild",
  storageBucket: "sena-guild.firebasestorage.app",
  messagingSenderId: "574594340110",
  appId: "1:574594340110:web:f4ce23f5dbcf13a8ecf35f"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const GUILD_DOC = doc(db, 'guild', 'main');
const HEROES_COL = collection(db, 'heroes');
async function persistMain(data){try{await setDoc(GUILD_DOC,data);}catch(e){showToast('저장 실패: '+e.message);}}
async function persistHero(hero){try{await setDoc(doc(db,'heroes',hero.id),hero);}catch(e){console.error(e);}}
async function deleteHeroDoc(heroId){try{await deleteDoc(doc(db,'heroes',heroId));}catch(e){console.error(e);}}
async function migrateHeroes(arr){
  try{
    const batch=writeBatch(db);
    arr.forEach(function(h){batch.set(doc(db,'heroes',h.id),h);});
    await batch.commit();
    await setDoc(GUILD_DOC,{_migrated:true},{merge:true});
  }catch(e){console.error('마이그레이션 실패',e);}
}
window._fb={persistMain,persistHero,deleteHeroDoc,migrateHeroes,db,GUILD_DOC,HEROES_COL,onSnapshot};
</script>
<title>스갤 - 세븐나이츠 리버스 길드전 배치툴</title>
<style>
:root{
  --bg:#0d0f1a;--bg2:#161929;--bg3:#1e2236;--card:#1a1d2e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#e8b84b;--gold2:#f5d080;--red:#e05555;--green:#45b87a;
  --purple:#9b6fe0;--blue:#4a8fe0;--text:#e8eaf0;--text2:#9aa0b8;--text3:#6a708a;
  --c-def:#e8b84b;--c-atk:#45b87a;--c-skill:#9b6fe0;--c-pet:#64a0f0;
}
body.light{
  --bg:#e8ecf3;--bg2:#dde3ed;--bg3:#d0d8e6;--card:#f0f3f8;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --gold:#b8820a;--gold2:#d9a000;--red:#c0392b;--green:#1e7a56;
  --purple:#6a3db0;--blue:#2563b0;--text:#111827;--text2:#374151;--text3:#6b7280;
  --c-def:#b07d08;--c-atk:#1e7a56;--c-skill:#6a3db0;--c-pet:#2a6cc4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans KR',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;;font-size:14px;font-weight:500;-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--border2);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;flex-shrink:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0d0f1a;}
.logo-text{font-size:15px;font-weight:600;}.logo-sub{font-size:11px;color:var(--text3);}
.hbtns{display:flex;gap:6px;flex-wrap:wrap;}

/* MAIN LAYOUT - 고정 높이, 각 패널 독립 스크롤 */
.wrap{display:grid;grid-template-columns:1fr clamp(260px,22vw,340px);flex:1;overflow:hidden;min-height:0;transition:grid-template-columns .2s;}
.main-area{padding:16px;border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;}
.side-panel{padding:14px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;}
@media(max-width:940px){.wrap{grid-template-columns:1fr;}.side-panel{border-top:1px solid var(--border);max-height:50vh;}}

/* BUTTONS */
.btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-gold{background:var(--gold);color:#0d0f1a;}.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}.btn-ghost:hover{background:var(--bg3);}
.btn-red{background:rgba(224,85,85,.18);color:var(--red);border:1px solid rgba(224,85,85,.3);}.btn-red:hover{background:rgba(224,85,85,.28);}
.btn-teal{background:rgba(69,184,122,.15);color:var(--green);border:1px solid rgba(69,184,122,.3);}.btn-teal:hover{background:rgba(69,184,122,.25);}
.btn-sm{padding:3px 9px;font-size:11px;}.btn-xs{padding:2px 7px;font-size:10px;}

.page-sec-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.page-sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* DECK GRID - 3열 */
.decks-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}

/* DECK CARD */
.deck-row{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s;display:flex;flex-direction:column;}
.deck-row.expanded{border-color:var(--border2);}
.deck-header{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;user-select:none;flex-shrink:0;}
.deck-header:hover{background:rgba(255,255,255,.02);}
.deck-chevron{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.deck-row.expanded .deck-chevron{transform:rotate(90deg);}
.deck-title-wrap{flex:1;min-width:0;}
.deck-name-input{background:transparent;border:none;outline:none;color:var(--text);font-size:clamp(12px,1.1vw,15px);font-weight:600;width:100%;cursor:text;border-bottom:1px solid transparent;transition:border-color .15s;}
.deck-name-input:hover{border-bottom-color:rgba(255,255,255,.15);}
.deck-name-input:focus{border-bottom-color:var(--gold);}
.deck-name-input::placeholder{color:var(--text3);}
.deck-meta{font-size:clamp(9px,0.85vw,12px);color:var(--text3);margin-top:1px;}
.deck-preview{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.prev-slot{width:24px;height:30px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.prev-slot img{width:100%;height:100%;object-fit:cover;}
.prev-slot .pe{font-size:11px;}

.deck-body{display:none;flex-direction:column;}
.deck-row.expanded .deck-body{display:flex;}

/* SECTIONS */
.deck-section{position:relative;padding:10px 12px 12px 16px;border-top:1px solid var(--border);}
.deck-section::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.deck-section.s-def{background:rgba(232,184,75,.025);}.deck-section.s-def::before{background:var(--c-def);}
.deck-section.s-atk{background:rgba(69,184,122,.025);}.deck-section.s-atk::before{background:var(--c-atk);}
.sec-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sec-label::after{content:'';flex:1;height:1px;opacity:.2;}
.s-def .sec-label{color:var(--c-def);}.s-def .sec-label::after{background:var(--c-def);}
.s-atk .sec-label{color:var(--c-atk);}.s-atk .sec-label::after{background:var(--c-atk);}

/* FORMATION BADGE */
.formation-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;cursor:pointer;flex-shrink:0;}
.formation-badge.f-attack{background:rgba(224,85,85,.2);color:#e05555;border:1px solid rgba(224,85,85,.4);}
.formation-badge.f-protect{background:rgba(69,184,122,.2);color:var(--green);border:1px solid rgba(69,184,122,.4);}
.formation-badge.f-balance{background:rgba(232,184,75,.2);color:var(--gold);border:1px solid rgba(232,184,75,.4);}
.formation-badge.f-basic{background:rgba(155,111,224,.2);color:var(--purple);border:1px solid rgba(155,111,224,.4);}
.formation-badge.f-none{background:rgba(255,255,255,.06);color:var(--text3);border:1px solid var(--border);}

/* FORMATION PICKER (dropdown) */
.formation-picker{position:absolute;top:100%;left:0;z-index:100;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:4px;display:none;flex-direction:column;gap:3px;min-width:100px;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.formation-picker.open{display:flex;}
.fpick-opt{font-size:10px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;}
.fpick-opt:hover{background:var(--bg3);}
.fpick-opt.f-attack{color:#e05555;}.fpick-opt.f-protect{color:var(--green);}
.fpick-opt.f-balance{color:var(--gold);}.fpick-opt.f-basic{color:var(--purple);}

/* HERO SLOTS - 작게 */
.slots-row{display:flex;gap:6px;flex-wrap:wrap;}
.slot{width:clamp(56px,5.5vw,90px);border-radius:8px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;flex-shrink:0;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);}
.slot:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);}
.slot.filled{border-style:solid;border-color:rgba(255,255,255,.14);}
.slot.active-pick{border-color:var(--gold)!important;background:rgba(232,184,75,.08)!important;box-shadow:0 0 0 1px var(--gold);}
.slot-img{width:clamp(56px,5.5vw,90px);height:clamp(56px,5.5vw,90px);object-fit:cover;display:block;}
.slot-emoji{font-size:clamp(20px,2vw,32px);padding:clamp(8px,1vw,14px) 0 4px;}
.slot-add{font-size:20px;color:rgba(255,255,255,.14);padding:20px 0;}
.slot-name{font-size:clamp(7px,0.7vw,10px);color:var(--text2);text-align:center;padding:2px 2px 3px;max-width:clamp(56px,5.5vw,90px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-skills{display:flex;gap:2px;padding:0 2px 20px;justify-content:center;}
.skill-ic{width:clamp(20px,2vw,32px);height:clamp(20px,2vw,32px);border-radius:4px;object-fit:cover;border:1px solid rgba(255,255,255,.1);}
.skill-ic-e{width:clamp(20px,2vw,32px);height:clamp(20px,2vw,32px);border-radius:4px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.08);}
.sbar{position:absolute;top:0;left:0;right:0;height:3px;}
.srm{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:9px;color:#fff;line-height:1;}
.slot:hover .srm{display:flex;}
.row-badge{position:absolute;bottom:0;left:0;right:0;font-size:clamp(9px,0.85vw,11px);font-weight:800;padding:2px 0;text-align:center;line-height:1.4;cursor:pointer;z-index:2;user-select:none;border-radius:0 0 7px 7px;}
.row-badge.front{background:rgba(37,99,176,.88);color:#fff;}
.row-badge.back{background:rgba(192,57,43,.88);color:#fff;}
.row-badge.none{background:rgba(100,100,120,.5);color:rgba(255,255,255,.7);}

.aslot{width:clamp(56px,5.5vw,90px);border-radius:8px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;flex-shrink:0;background:rgba(69,184,122,.04);border:1px dashed rgba(69,184,122,.2);}
.aslot:hover{border-color:rgba(69,184,122,.4);}
.aslot.filled{border-style:solid;border-color:rgba(69,184,122,.2);background:rgba(69,184,122,.05);}
.aslot.active-pick{border-color:var(--green)!important;background:rgba(69,184,122,.1)!important;box-shadow:0 0 0 1px var(--green);}
.aslot .srm{display:none;}.aslot:hover .srm{display:flex;}

/* SKILL + PET */
.sp-row{display:flex;align-items:flex-start;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap;}
.sp-block{display:flex;flex-direction:column;gap:4px;}
.sp-block-label{font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;opacity:.7;}
.sp-block-label.skill{color:var(--c-skill);}.sp-block-label.pet{color:var(--c-pet);}
.so-row{display:flex;gap:4px;align-items:center;}
.so-slot{width:clamp(34px,3.5vw,56px);height:clamp(34px,3.5vw,56px);border-radius:7px;background:rgba(155,111,224,.06);border:1px dashed rgba(155,111,224,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;flex-shrink:0;}
.so-slot:hover{border-color:rgba(155,111,224,.6);}
.so-slot.active-pick{border-color:var(--purple)!important;box-shadow:0 0 0 1px var(--purple);background:rgba(155,111,224,.12)!important;}
.so-slot img{width:100%;height:100%;object-fit:cover;}
.so-slot .so-plus{font-size:15px;color:rgba(155,111,224,.3);}
.so-slot .so-rm{position:absolute;top:1px;right:1px;width:12px;height:12px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;font-size:8px;color:#fff;cursor:pointer;line-height:1;}
.so-slot:hover .so-rm{display:flex;}
.so-seq{font-size:7px;color:var(--text3);text-align:center;margin-top:2px;}
.so-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.pet-slot{width:clamp(34px,3.5vw,56px);height:clamp(34px,3.5vw,56px);border-radius:7px;background:rgba(100,160,240,.05);border:1px dashed rgba(100,160,240,.25);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:all .15s;flex-shrink:0;}
.pet-slot:hover{border-color:rgba(100,160,240,.5);}
.pet-slot.filled{border-style:solid;border-color:rgba(100,160,240,.3);}
.pet-slot.active-pick{border-color:var(--c-pet)!important;box-shadow:0 0 0 1px var(--c-pet);}
.pet-slot img{width:100%;height:100%;object-fit:cover;display:block;}
.pet-slot .pet-add{font-size:15px;color:rgba(100,160,240,.3);}
.pet-slot .pet-rm{position:absolute;top:1px;right:1px;width:12px;height:12px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;font-size:8px;color:#fff;cursor:pointer;}
.pet-slot:hover .pet-rm{display:flex;}
.pet-slot-sm{width:28px;height:28px;border-radius:5px;background:rgba(100,160,240,.04);border:1px dashed rgba(100,160,240,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:all .15s;flex-shrink:0;}
.pet-slot-sm:hover{border-color:rgba(100,160,240,.5);}
.pet-slot-sm.filled{border-style:solid;border-color:rgba(100,160,240,.25);}
.pet-slot-sm.active-pick{border-color:var(--c-pet)!important;box-shadow:0 0 0 1px var(--c-pet);}
.pet-slot-sm img{width:100%;height:100%;object-fit:cover;display:block;}
.pet-slot-sm .pet-add{font-size:12px;color:rgba(100,160,240,.25);}
.pet-slot-sm .pet-rm{position:absolute;top:0;right:0;width:10px;height:10px;border-radius:50%;background:rgba(224,85,85,.85);display:none;align-items:center;justify-content:center;font-size:7px;color:#fff;cursor:pointer;}
.pet-slot-sm:hover .pet-rm{display:flex;}

/* ATK GRID - 2열 */
.atk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.atk-grid{grid-template-columns:1fr;}}
.atk-card{background:rgba(69,184,122,.03);border:1px solid rgba(69,184,122,.12);border-radius:8px;overflow:hidden;}
.atk-card-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid rgba(69,184,122,.1);position:relative;}
.atk-card-num{font-size:9px;font-weight:700;color:var(--c-atk);}
.atk-deck-del{width:18px;height:18px;border-radius:4px;background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .15s;}
.atk-deck-del:hover{background:rgba(224,85,85,.3);}
.atk-card-body{padding:7px;}
.add-atk-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--c-atk);cursor:pointer;padding:5px 10px;border:1px dashed rgba(69,184,122,.35);border-radius:7px;background:transparent;transition:all .15s;font-weight:600;margin-top:4px;}
.add-atk-btn:hover{background:rgba(69,184,122,.07);border-color:rgba(69,184,122,.6);}

/* 방어덱 추가/삭제 */
.add-def-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--c-def);cursor:pointer;padding:5px 10px;border:1px dashed rgba(232,184,75,.35);border-radius:7px;background:transparent;transition:all .15s;font-weight:600;margin-top:6px;}
.add-def-btn:hover{background:rgba(232,184,75,.07);border-color:rgba(232,184,75,.6);}
.def-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:700px){.def-grid{grid-template-columns:1fr;}}
@media(max-width:500px){.def-grid{grid-template-columns:1fr;}}
.def-card{background:rgba(232,184,75,.03);border:1px solid rgba(232,184,75,.12);border-radius:8px;overflow:hidden;}
.def-card-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid rgba(232,184,75,.1);}
.def-card-num{font-size:9px;font-weight:700;color:var(--c-def);}
.def-deck-del{width:18px;height:18px;border-radius:4px;background:rgba(224,85,85,.15);border:1px solid rgba(224,85,85,.2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .15s;}
.def-deck-del:hover{background:rgba(224,85,85,.3);}
.def-card-body{padding:7px;}

/* NOTE */
.deck-note-wrap{padding:6px 10px 8px;}
.deck-note-wrap textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:11px;padding:6px 8px;outline:none;resize:vertical;min-height:36px;font-family:inherit;}
.deck-actions{display:flex;gap:6px;padding:0 10px 8px;}

.deck-row.dragging{opacity:.4;}
.deck-row.drag-over{outline:2px solid var(--gold);outline-offset:-2px;}
.deck-drag-handle{cursor:grab;color:var(--text3);font-size:16px;padding:0 4px;flex-shrink:0;user-select:none;line-height:1;}
.deck-drag-handle:hover{color:var(--text);}
.add-deck-btn{border:1px dashed var(--border2);border-radius:10px;padding:10px;text-align:center;cursor:pointer;color:var(--text3);font-size:12px;transition:all .15s;}
.add-deck-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(232,184,75,.04);}

/* SIDE PANEL */
.pick-hint{border-radius:8px;padding:7px 10px;font-size:11px;margin-bottom:10px;display:none;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.pick-hint.show{display:flex;}
.pick-hint.def{background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.35);color:var(--c-def);}
.pick-hint.atk{background:rgba(69,184,122,.12);border:1px solid rgba(69,184,122,.35);color:var(--c-atk);}
.pick-hint.skill{background:rgba(155,111,224,.12);border:1px solid rgba(155,111,224,.35);color:var(--c-skill);}
.pick-hint.pet-mode{background:rgba(100,160,240,.12);border:1px solid rgba(100,160,240,.35);color:var(--c-pet);}
.side-search{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;margin-bottom:6px;flex-shrink:0;}
.side-search::placeholder{color:var(--text3);}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;flex-shrink:0;}
.sort-row{display:flex;gap:4px;margin-bottom:6px;flex-shrink:0;}
.ftab{font-size:10px;padding:3px 8px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;}
.ftab.on{background:var(--gold);color:#0d0f1a;border-color:var(--gold);font-weight:600;}
.sort-btn{font-size:10px;padding:3px 8px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:3px;}
.sort-btn:hover{border-color:var(--border2);color:var(--text);}
.sort-btn.on{background:var(--bg3);border-color:var(--border2);color:var(--text);font-weight:600;}
.char-list{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;overflow-y:auto;flex:1;}
.char-card{background:var(--bg3);border-radius:7px;padding:5px 3px 4px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.char-card:hover{border-color:var(--gold);background:rgba(232,184,75,.06);}
.char-card.dimmed{opacity:.35;pointer-events:none;}
.char-card.hl-atk{border-color:rgba(69,184,122,.5);background:rgba(69,184,122,.06);}
.char-card.hl-def{border-color:rgba(232,184,75,.5);background:rgba(232,184,75,.06);}
.char-card.hl-skill{border-color:rgba(155,111,224,.5);background:rgba(155,111,224,.06);}
.cimg{width:52px;height:52px;border-radius:7px;margin:0 auto 3px;overflow:hidden;position:relative;}
.cimg img{width:100%;height:100%;object-fit:cover;}
.cimge{font-size:22px;line-height:50px;display:block;text-align:center;}
.crbar{position:absolute;bottom:0;left:0;right:0;height:3px;}
.rarity-oldsena{background:linear-gradient(90deg,#e05555,#f07070);}
.rarity-legendary{background:linear-gradient(90deg,var(--gold),var(--gold2));}
.rarity-epic{background:linear-gradient(90deg,var(--purple),#b088f0);}
.rarity-rare{background:linear-gradient(90deg,var(--blue),#6aaaf5);}
.cname{font-size:8px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ctype{font-size:7px;margin-top:1px;}
.type-공격형{color:#e05555;}.type-마법형{color:#6aaaf5;}.type-지원형{color:#45b87a;}.type-방어형{color:#e8b84b;}.type-만능형{color:#9b6fe0;}
.av-공격형{background:rgba(224,85,85,.15);}.av-마법형{background:rgba(106,170,245,.15);}.av-지원형{background:rgba(69,184,122,.15);}.av-방어형{background:rgba(232,184,75,.15);}.av-만능형{background:rgba(155,111,224,.15);}
.tb-공격형{background:linear-gradient(90deg,#e05555,#f07070);}.tb-마법형{background:linear-gradient(90deg,#4a8fe0,#6aaaf5);}.tb-지원형{background:linear-gradient(90deg,#45b87a,#6dd49a);}.tb-방어형{background:linear-gradient(90deg,#e8b84b,#f5d080);}.tb-만능형{background:linear-gradient(90deg,#9b6fe0,#b088f0);}
.in-def-badge{position:absolute;top:2px;left:2px;font-size:7px;background:rgba(224,85,85,.75);color:#fff;padding:1px 3px;border-radius:3px;line-height:1.4;}
.in-atk-badge{position:absolute;top:2px;right:2px;font-size:7px;background:rgba(69,184,122,.75);color:#fff;padding:1px 3px;border-radius:3px;line-height:1.4;}
.char-card-skills{display:flex;gap:3px;justify-content:center;margin-top:3px;}
.cc-skill{width:20px;height:20px;border-radius:4px;object-fit:cover;border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:all .15s;}
.cc-skill:hover{border-color:var(--purple);transform:scale(1.12);}
.cc-skill-empty{width:20px;height:20px;border-radius:4px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.08);}
.pet-card{background:var(--bg3);border-radius:7px;padding:5px 3px 4px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.pet-card:hover{border-color:var(--c-pet);background:rgba(100,160,240,.06);}
.pet-card.hl-pet{border-color:rgba(100,160,240,.5);background:rgba(100,160,240,.06);}
.pimg{width:50px;height:50px;border-radius:7px;margin:0 auto 3px;overflow:hidden;background:rgba(100,160,240,.1);display:flex;align-items:center;justify-content:center;}
.pimg img{width:100%;height:100%;object-fit:cover;}
.pname{font-size:8px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.page-sec-title-side{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.page-sec-title-side::after{content:'';flex:1;height:1px;background:var(--border);}
.side-tab-bar{display:flex;align-items:center;gap:0;margin-bottom:10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.side-tab{font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;}
.side-tab:hover{color:var(--text2);}
.side-tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.side-toggle-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);cursor:pointer;font-size:13px;padding:5px 10px;transition:all .15s;flex-shrink:0;font-weight:700;}
.side-toggle-btn:hover{background:var(--gold);color:#0d0f1a;border-color:var(--gold);}
.side-panel.collapsed{padding:8px 6px;width:36px;min-width:36px;}
.wrap.side-collapsed{grid-template-columns:1fr 36px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-head h3{font-size:14px;font-weight:600;}
.modal-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:0;}
.modal-body{padding:16px;overflow-y:auto;}
.form-field{margin-bottom:12px;}
.form-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;letter-spacing:.04em;}
.form-field input,.form-field select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;}
.frow{display:flex;gap:8px;}.frow .form-field{flex:1;}
.img-upload-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.img-box{width:82px;height:82px;flex-shrink:0;border-radius:10px;border:1px dashed var(--border2);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.img-box:hover{border-color:var(--gold);}.img-box.purple:hover{border-color:var(--purple);}
.img-box img{width:100%;height:100%;object-fit:cover;display:none;}
.img-box .uh{font-size:9px;color:var(--text3);text-align:center;padding:3px;pointer-events:none;line-height:1.5;}
.img-box input[type=file]{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}
.skill-upload-row{display:flex;gap:10px;margin-bottom:12px;}
.skill-img-box{width:66px;height:66px;flex-shrink:0;border-radius:8px;border:1px dashed rgba(155,111,224,.35);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;}
.skill-img-box:hover{border-color:var(--purple);}
.skill-img-box img{width:100%;height:100%;object-fit:cover;display:none;}
.skill-img-box .uh{font-size:9px;color:var(--text3);text-align:center;pointer-events:none;line-height:1.5;}
.skill-img-box input[type=file]{position:absolute;width:0;height:0;opacity:0;pointer-events:none;}
.skill-box-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.skill-box-label{font-size:10px;color:var(--text3);}
.modal-char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}
.modal-pet-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding-top:12px;margin-top:4px;border-top:1px solid var(--border);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon">7K</div>
    <div><div class="logo-text">스갤 길드전 배치툴 by 세진이당</div><div class="logo-sub">세븐나이츠 리버스</div></div>
  </div>
  <div class="hbtns">
    <button class="btn btn-ghost btn-sm" id="theme-btn" onclick="toggleTheme()">🌙 다크모드</button>
    <button class="btn btn-ghost btn-sm" onclick="doSave()">💾 저장</button>
    <button class="btn btn-ghost btn-sm" onclick="doReset()">초기화</button>
    <button class="btn btn-teal btn-sm" onclick="openPetModal()">🐾 펫 관리</button>
    <button class="btn btn-gold btn-sm" onclick="openHeroModal()">+ 영웅 추가</button>
  </div>
</div>

<div class="wrap">
  <div class="main-area">
    <div class="page-sec-title">방어덱 목록</div>
    <div class="decks-grid" id="decks-container"></div>
    <div class="add-deck-btn" onclick="addDeck()">＋ 방어덱 추가</div>
  </div>
  <div class="side-panel" id="side-panel">
    <div class="pick-hint" id="pick-hint">
      <span id="pick-hint-text">슬롯을 클릭하세요</span>
      <button class="btn btn-ghost btn-xs" onclick="cancelPick()">취소</button>
    </div>
    <!-- 탭 헤더 -->
    <div class="side-tab-bar">
      <div class="side-tab on" id="stab-hero" onclick="setSideTab('hero',this)">영웅</div>
      <div class="side-tab" id="stab-pet" onclick="setSideTab('pet',this)">펫</div>
      <div style="flex:1;"></div>
      <button class="side-toggle-btn" onclick="toggleSidePanel()" id="side-toggle-btn" title="목록 접기">◀</button>
    </div>
    <!-- 영웅 탭 -->
    <div id="side-hero-section" style="display:flex;flex-direction:column;flex:1;min-height:0;">
      <input class="side-search" type="text" id="side-search" placeholder="영웅 검색..." oninput="renderHeroList()">
      <div class="sort-row">
        <button class="sort-btn on" id="sort-name-btn" onclick="setSort('name',this)">ㄱㄴㄷ <span id="sort-name-arrow">↑</span></button>
        <button class="sort-btn" id="sort-rarity-btn" onclick="setSort('rarity',this)">등급 <span id="sort-rarity-arrow">↑</span></button>
      </div>
      <div class="filter-row">
        <div class="ftab on" onclick="setFilter('전체',this)">전체</div>
        <div class="ftab" onclick="setFilter('공격형',this)">공격형</div>
        <div class="ftab" onclick="setFilter('마법형',this)">마법형</div>
        <div class="ftab" onclick="setFilter('지원형',this)">지원형</div>
        <div class="ftab" onclick="setFilter('방어형',this)">방어형</div>
        <div class="ftab" onclick="setFilter('만능형',this)">만능형</div>
      </div>
      <div class="char-list" id="char-list"></div>
    </div>
    <!-- 펫 탭 -->
    <div id="side-pet-section" style="display:none;flex-direction:column;flex:1;min-height:0;">
      <div class="char-list" id="pet-list" style="overflow-y:auto;flex:1;align-content:start;"></div>
    </div>
    <!-- 접힌 상태 버튼 -->
    <div id="side-collapsed-btn" style="display:none;flex-direction:column;align-items:center;gap:8px;padding-top:8px;">
      <button class="side-toggle-btn" onclick="toggleSidePanel()" title="목록 펼치기">▶</button>
    </div>
  </div>
</div>

<!-- HERO MODAL -->
<div class="modal-overlay" id="modal-hero">
  <div class="modal">
    <div class="modal-head"><h3 id="modal-hero-title">영웅 추가</h3><button class="modal-close" onclick="closeModal('modal-hero')">✕</button></div>
    <div class="modal-body">
      <div class="img-upload-row">
        <label class="img-box" for="hero-img-file">
          <img id="img-preview"><div class="uh" id="img-hint">📷<br>영웅 이미지</div>
          <input type="file" id="hero-img-file" accept="image/*" onchange="handleHeroImg(event)">
        </label>
        <div style="flex:1">
          <div class="form-field"><label>영웅 이름</label><input type="text" id="h-name" placeholder="이름 입력" onkeydown="if(event.key==='Enter')saveHero()"></div>
          <div class="frow">
            <div class="form-field"><label>타입</label><select id="h-type"><option value="공격형">공격형</option><option value="마법형">마법형</option><option value="지원형">지원형</option><option value="방어형">방어형</option><option value="만능형">만능형</option></select></div>
            <div class="form-field"><label>등급</label><select id="h-rarity"><option value="oldsena">구세나</option><option value="legendary">찐스</option><option value="epic">짭스</option><option value="rare">희귀</option></select></div>
          </div>
          <div class="form-field"><label>이모지 (이미지 없을 때)</label><input type="text" id="h-emoji" placeholder="⚔" maxlength="2"></div>
        </div>
      </div>
      <div class="form-field">
        <label>스킬 이미지</label>
        <div class="skill-upload-row">
          <div class="skill-box-wrap"><label class="skill-img-box" for="skill1-file"><img id="skill1-preview"><div class="uh" id="skill1-hint">🔷<br>스킬1</div><input type="file" id="skill1-file" accept="image/*" onchange="handleSkillImg(event,1)"></label><span class="skill-box-label">스킬 1</span></div>
          <div class="skill-box-wrap"><label class="skill-img-box" for="skill2-file"><img id="skill2-preview"><div class="uh" id="skill2-hint">🔷<br>스킬2</div><input type="file" id="skill2-file" accept="image/*" onchange="handleSkillImg(event,2)"></label><span class="skill-box-label">스킬 2</span></div>
        </div>

      </div>
      <div style="margin-top:14px;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">등록된 영웅 — 클릭하여 수정</div>
      <div class="modal-char-grid" id="modal-char-grid"></div>
    </div>
  </div>
</div>

<!-- PET MODAL -->
<div class="modal-overlay" id="modal-pet">
  <div class="modal">
    <div class="modal-head"><h3 id="modal-pet-title">펫 추가</h3><button class="modal-close" onclick="closeModal('modal-pet')">✕</button></div>
    <div class="modal-body">
      <div class="img-upload-row">
        <label class="img-box purple" for="pet-img-file">
          <img id="pet-img-preview"><div class="uh" id="pet-img-hint">🐾<br>펫 이미지</div>
          <input type="file" id="pet-img-file" accept="image/*" onchange="handlePetImg(event)">
        </label>
        <div style="flex:1"><div class="form-field"><label>펫 이름</label><input type="text" id="p-name" placeholder="펫 이름 입력" onkeydown="if(event.key==='Enter')savePet()"></div></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-gold" style="flex:1" onclick="savePet()">저장하기</button>
        <button class="btn btn-ghost btn-sm" id="btn-cancel-pet-edit" style="display:none" onclick="cancelPetEdit()">취소</button>
      </div>
      <div style="margin-top:14px;font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;">등록된 펫</div>
      <div class="modal-pet-grid" id="modal-pet-grid"></div>
    </div>
  </div>
</div>

<!-- FORMATION MODAL -->
<div class="modal-overlay" id="modal-formation">
  <div class="modal" style="max-width:280px;">
    <div class="modal-head"><h3>진형 선택</h3><button class="modal-close" onclick="closeModal('modal-formation')">✕</button></div>

  </div>
</div>

function compressImage(file,maxPx,callback){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      var canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/webp',0.75));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function makeHeroSlot(deckId,mode,idx,si,hid){
  var deck=decks.find(function(x){return x.id===deckId;});
  var grp=deck?(mode==='def'?deck.defs[idx]:deck.atks[idx]):null;
  var rowVal=grp&&grp.rows?grp.rows[si]:'';
  var h=hid?getHero(hid):null;
  var isActive=pick&&pick.mode==='hero'&&pick.deckId===deckId&&pick.subMode===mode&&pick.atkIdx===idx&&pick.slotIdx===si;
  var isAtk=mode==='atk';
  var cls=(isAtk?'aslot':'slot')+(isActive?' active-pick':'')+(h?' filled':'');
  if(h){
    var rowCls=rowVal==='front'?'front':rowVal==='back'?'back':'none';
    var rowLbl=rowVal==='front'?'전열':rowVal==='back'?'후열':'배치선택';
    var img=h.img?'<img class="slot-img" src="'+h.img+'">':'<span class="slot-emoji">'+(h.emoji||'?')+'</span>';
    var s1=h.s1?'<img class="skill-ic" src="'+h.s1+'">':'<div class="skill-ic-e"></div>';
    var s2=h.s2?'<img class="skill-ic" src="'+h.s2+'">':'<div class="skill-ic-e"></div>';
    return '<div class="'+cls+'">'
      +'<div class="sbar tb-'+h.type+'"></div>'
      +'<div class="row-badge '+rowCls+'" onclick="event.stopPropagation();cycleRow(&#39;'+deckId+'&#39;,&#39;'+mode+'&#39;,'+idx+','+si+')">'+rowLbl+'</div>'
      +img+'<span class="slot-name">'+xe(h.name)+'</span>'
      +'<div class="slot-skills">'+s1+s2+'</div>'
      +'<div class="srm" onclick="event.stopPropagation();rmHero(&#39;'+deckId+'&#39;,&#39;'+mode+'&#39;,'+idx+','+si+')">✕</div>'
      +'</div>';
  }
  return '<div class="'+cls+'" onclick="startHeroPick(&#39;'+deckId+'&#39;,&#39;'+mode+'&#39;,'+idx+','+si+')"><span class="slot-add">+</span></div>';
}
function makeSpRow(deckId,mode,idx,group){
  var h='<div class="sp-row">';
  // 스킬순서
  h+='<div class="sp-block"><div class="sp-block-label skill">⚡ 스킬순서</div><div class="so-row">';
  group.skillOrder.forEach(function(so,i){
    var isActive=pick&&pick.mode==='skill'&&pick.deckId===deckId&&pick.subMode===mode&&pick.atkIdx===idx&&pick.slotIdx===i;
    var c='so-slot'+(isActive?' active-pick':'');
    var inner,name='';
    if(so){
      var hero=getHero(so.heroId);
      var sImg=hero?(so.skillNum===1?hero.s1:hero.s2):'';
      inner=sImg?'<img src="'+sImg+'">':'<span style="font-size:9px;color:var(--c-skill);font-weight:700">'+(so.skillNum===1?'S1':'S2')+'</span>';
      name=(hero?xe(hero.name.slice(0,3)):'-')+(so.skillNum===1?' S1':' S2');
    } else {inner='<span class="so-plus">+</span>';name=' ';}
    var rm=so?'<div class="so-rm" onclick="event.stopPropagation();rmSkillOrder(\''+deckId+'\',\''+mode+'\','+idx+','+i+')">✕</div>':'';
    h+='<div class="so-item"><div class="'+c+'" onclick="startSkillPick(\''+deckId+'\',\''+mode+'\','+idx+','+i+')">'+inner+rm+'</div><div class="so-seq">'+(i+1)+(name!=' '?'<br><span style="color:var(--c-skill)">'+name+'</span>':'')+'</div></div>';
  });
  h+='</div></div>';
  // 펫
  h+='<div class="sp-block"><div class="sp-block-label pet">🐾 펫</div><div class="so-row" style="align-items:flex-end;">';
  var _pets=group.pets||[null,null,null];
  _pets.forEach(function(pid,pi){
    var pet=pid?getPet(pid):null;
    var isActivePet=pick&&pick.mode==='pet'&&pick.deckId===deckId&&pick.subMode===mode&&pick.atkIdx===idx&&pick.petIdx===pi;
    if(pi===0){
      var pcls='pet-slot'+(isActivePet?' active-pick':'')+(pet?' filled':'');
      h+='<div class="so-item"><div class="'+pcls+'" onclick="startPetPick(\''+deckId+'\',\''+mode+'\','+idx+',0)">';
      if(pet){h+=(pet.img?'<img src="'+pet.img+'">':'<span class="pet-add">🐾</span>')+'<div class="pet-rm" onclick="event.stopPropagation();rmPet(\''+deckId+'\',\''+mode+'\','+idx+',0)">✕</div>';}
      else h+='<span class="pet-add">🐾</span>';
      h+='</div><div class="so-seq">'+(pet?xe(pet.name.slice(0,4)):'1')+'</div></div>';
    } else {
      var pcls='pet-slot-sm'+(isActivePet?' active-pick':'')+(pet?' filled':'');
      h+='<div class="so-item"><div class="'+pcls+'" onclick="startPetPick(\''+deckId+'\',\''+mode+'\','+idx+','+pi+')">';
      if(pet){h+=(pet.img?'<img src="'+pet.img+'">':'<span class="pet-add" style="font-size:12px">🐾</span>')+'<div class="pet-rm" onclick="event.stopPropagation();rmPet(\''+deckId+'\',\''+mode+'\','+idx+','+pi+')">✕</div>';}
      else h+='<span class="pet-add" style="font-size:12px">🐾</span>';
      h+='</div><div class="so-seq">'+pi+'</div></div>';
    }
  });
  h+='</div></div></div>';
  return h;
}

function toggleDeck(id){var d=decks.find(function(x){return x.id===id;});if(d){d.expanded=!d.expanded;localStorage.setItem('sk6_decks',JSON.stringify(decks));renderDecks();}}
function cycleRow(deckId,mode,idx,si){
  var deck=decks.find(function(x){return x.id===deckId;});if(!deck)return;
  var grp=mode==='def'?deck.defs[idx]:deck.atks[idx];if(!grp)return;
  if(!grp.rows)grp.rows=['','',''];
  var cur=grp.rows[si]||'';
  grp.rows[si]=cur===''?'front':cur==='front'?'back':'';
  persist();renderDecks();
}
var _deckDragId=null;
function deckDragStart(e,id){
  _deckDragId=id;
  var row=document.getElementById('dk-'+id);
  if(row)row.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function deckDragEnd(e){
  if(_deckDragId){var row=document.getElementById('dk-'+_deckDragId);if(row)row.classList.remove('dragging');}
  document.querySelectorAll('.deck-row.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  _deckDragId=null;
}
function renameDeck(id,v){var d=decks.find(function(x){return x.id===id;});if(d){d.name=v;persist();}}
function noteDeck(id,v){var d=decks.find(function(x){return x.id===id;});if(d){d.note=v;persist();}}
function noteDefDeck(id,di,v){var d=decks.find(function(x){return x.id===id;});if(d&&d.defs[di]){d.defs[di].note=v;persist();}}
function noteAtkDeck(id,ai,v){var d=decks.find(function(x){return x.id===id;});if(d&&d.atks[ai]){d.atks[ai].note=v;persist();}}
function delDeck(id){
  if(!confirm('이 방어덱을 삭제할까요?'))return;
  decks=decks.filter(function(x){return x.id!==id;});
  if(pick&&pick.deckId===id)cancelPick();
  persist();renderDecks();renderHeroList();
}
function addDeck(){
  var id='dk'+Date.now();
  decks.push({id:id,name:'방어덱 '+(decks.length+1),defs:[emptyGroup()],atks:[emptyGroup()],note:'',expanded:true});
  persist();renderDecks();
  setTimeout(function(){var el=document.getElementById('dk-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}
function addDefDeck(deckId){
  var d=decks.find(function(x){return x.id===deckId;});
  if(!d||d.defs.length>=3)return;
  d.defs.push(emptyGroup());persist();renderDecks();
}
function delDefDeck(deckId,di){
  var d=decks.find(function(x){return x.id===deckId;});
  if(!d||d.defs.length<=1)return;
  if(pick&&pick.deckId===deckId&&pick.subMode==='def'&&pick.atkIdx===di)cancelPick();
  d.defs.splice(di,1);persist();renderDecks();renderHeroList();
}
function addAtkDeck(deckId){var d=decks.find(function(x){return x.id===deckId;});if(!d)return;d.atks.push(emptyGroup());persist();renderDecks();}
function delAtkDeck(deckId,ai){
  var d=decks.find(function(x){return x.id===deckId;});if(!d||d.atks.length<=1)return;
  if(pick&&pick.deckId===deckId&&pick.subMode==='atk'&&pick.atkIdx===ai)cancelPick();
  d.atks.splice(ai,1);persist();renderDecks();renderHeroList();
}

function openFormation(deckId,mode,idx){

function setFormation(val){
  var d=decks.find(function(x){return x.id===pickingFormationDeckId;});

    var grp=getGroup(d,pickingFormationMode,pickingFormationIdx);

}

// ── PICK: HERO ────────────────────────────────────────────────
function startHeroPick(deckId,mode,idx,si){
  pick={mode:'hero',deckId:deckId,subMode:mode,atkIdx:idx,slotIdx:si};
  var d=decks.find(function(x){return x.id===deckId;});
  var label=(mode==='def'?'방어 '+(idx+1):'공격덱 '+(idx+1))+' 슬롯 '+(si+1);
  document.getElementById('pick-hint').className='pick-hint show '+(mode==='atk'?'atk':'def');
  document.getElementById('pick-hint-text').textContent='['+(d?d.name:'')+'] '+label;
  showHeroSide();renderDecks();renderHeroList();
}
function cancelPick(){
  pick=null;document.getElementById('pick-hint').className='pick-hint';
  showHeroSide();renderDecks();renderHeroList();
}
function assignHero(heroId){
  if(!pick||pick.mode!=='hero'){showToast('먼저 슬롯을 클릭하세요');return;}
  var deck=decks.find(function(x){return x.id===pick.deckId;});if(!deck)return;
  var grp=getGroup(deck,pick.subMode,pick.atkIdx);
  if(grp.heroes.indexOf(heroId)!==-1){showToast('이미 배치된 영웅');return;}
  grp.heroes[pick.slotIdx]=heroId;
  var next=-1;for(var i=0;i<grp.heroes.length;i++){if(grp.heroes[i]===null){next=i;break;}}
  if(next!==-1){pick.slotIdx=next;var label=(pick.subMode==='def'?'방어 '+(pick.atkIdx+1):'공격덱 '+(pick.atkIdx+1))+' 슬롯 '+(next+1);document.getElementById('pick-hint-text').textContent='['+deck.name+'] '+label;}
  else{pick=null;document.getElementById('pick-hint').className='pick-hint';}
  persist();renderDecks();renderHeroList();
}
function rmHero(deckId,mode,idx,si){
  var d=decks.find(function(x){return x.id===deckId;});if(!d)return;
  var grp=getGroup(d,mode,idx);
  var rid=grp.heroes[si];grp.heroes[si]=null;
  if(rid)grp.skillOrder=grp.skillOrder.map(function(so){return(so&&so.heroId===rid)?null:so;});
  persist();renderDecks();renderHeroList();
}

// ── PICK: SKILL ───────────────────────────────────────────────
function startSkillPick(deckId,mode,idx,si){
  pick={mode:'skill',deckId:deckId,subMode:mode,atkIdx:idx,slotIdx:si};
  var d=decks.find(function(x){return x.id===deckId;});
  document.getElementById('pick-hint').className='pick-hint show skill';
  document.getElementById('pick-hint-text').textContent='['+(d?d.name:'')+'] '+(mode==='def'?'방어 '+(idx+1):'공격덱 '+(idx+1))+' 스킬순서 '+(si+1);
  showHeroSide();renderDecks();renderHeroList();
}
function assignSkill(heroId,skillNum){
  if(!pick||pick.mode!=='skill')return;
  var deck=decks.find(function(x){return x.id===pick.deckId;});if(!deck)return;
  var grp=getGroup(deck,pick.subMode,pick.atkIdx);
  if(grp.heroes.indexOf(heroId)===-1){showToast('이 덱에 배치된 영웅만 선택 가능');return;}
  grp.skillOrder[pick.slotIdx]={heroId:heroId,skillNum:skillNum};
  var next=-1;for(var i=0;i<grp.skillOrder.length;i++){if(!grp.skillOrder[i]){next=i;break;}}
  if(next!==-1){pick.slotIdx=next;}else{pick=null;document.getElementById('pick-hint').className='pick-hint';}
  persist();renderDecks();renderHeroList();
}
function rmSkillOrder(deckId,mode,idx,si){
  var d=decks.find(function(x){return x.id===deckId;});if(!d)return;
  getGroup(d,mode,idx).skillOrder[si]=null;persist();renderDecks();
}

// ── PICK: PET ─────────────────────────────────────────────────
function startPetPick(deckId,mode,idx,pi){
  pi=pi||0;
  pick={mode:'pet',deckId:deckId,subMode:mode,atkIdx:idx,petIdx:pi};
  var d=decks.find(function(x){return x.id===deckId;});
  document.getElementById('pick-hint').className='pick-hint show pet-mode';
  document.getElementById('pick-hint-text').textContent='['+(d?d.name:'')+'] '+(mode==='def'?'방어 '+(idx+1):'공격덱 '+(idx+1))+' 펫 선택';
  showPetSide();renderDecks();renderPetList();
}
function assignPet(petId){
  if(!pick||pick.mode!=='pet')return;
  var deck=decks.find(function(x){return x.id===pick.deckId;});if(!deck)return;
  var grp=getGroup(deck,pick.subMode,pick.atkIdx);
  if(!grp.pets)grp.pets=[null,null,null];
  grp.pets[pick.petIdx||0]=petId;
  pick=null;document.getElementById('pick-hint').className='pick-hint';
  persist();renderDecks();showHeroSide();renderHeroList();
}
function rmPet(deckId,mode,idx,pi){
  pi=pi||0;var d=decks.find(function(x){return x.id===deckId;});if(!d)return;
  var grp=getGroup(d,mode,idx);if(!grp.pets)grp.pets=[null,null,null];
  grp.pets[pi]=null;persist();renderDecks();
}

// ── SIDE ──────────────────────────────────────────────────────
var sideCollapsed=false;
var currentSideTab='hero';
function setSideTab(tab,el){
  currentSideTab=tab;
  document.querySelectorAll('.side-tab').forEach(function(t){t.classList.remove('on');});
  if(el)el.classList.add('on');
  document.getElementById('side-hero-section').style.display=tab==='hero'?'flex':'none';
  document.getElementById('side-pet-section').style.display=tab==='pet'?'flex':'none';
  if(tab==='pet')renderPetList();
}
function showHeroSide(){
  if(sideCollapsed)return;
  setSideTab('hero',document.getElementById('stab-hero'));
}
function showPetSide(){
  if(sideCollapsed){toggleSidePanel();}
  setSideTab('pet',document.getElementById('stab-pet'));
}
function toggleSidePanel(){
  sideCollapsed=!sideCollapsed;
  var panel=document.getElementById('side-panel');
  var wrap=document.querySelector('.wrap');
  var tabBar=document.querySelector('.side-tab-bar');
  var heroSec=document.getElementById('side-hero-section');
  var petSec=document.getElementById('side-pet-section');
  var collBtn=document.getElementById('side-collapsed-btn');
  var hint=document.getElementById('pick-hint');
  if(sideCollapsed){
    panel.classList.add('collapsed');
    wrap.classList.add('side-collapsed');
    tabBar.style.display='none';
    heroSec.style.display='none';
    petSec.style.display='none';
    hint.style.display='none';
    collBtn.style.display='flex';
  } else {
    panel.classList.remove('collapsed');
    wrap.classList.remove('side-collapsed');
    tabBar.style.display='';
    collBtn.style.display='none';
    hint.style.display='';
    setSideTab(currentSideTab, document.getElementById('stab-'+currentSideTab));
  }
}
function setFilter(f,el){heroFilter=f;document.querySelectorAll('.ftab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');renderHeroList();}
function setSort(by,el){
  if(sortBy===by){sortDir=sortDir==='asc'?'desc':'asc';}else{sortBy=by;sortDir='asc';}
  document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.remove('on');});el.classList.add('on');
  document.getElementById('sort-name-arrow').textContent=sortBy==='name'?(sortDir==='asc'?'↑':'↓'):'↑';
  document.getElementById('sort-rarity-arrow').textContent=sortBy==='rarity'?(sortDir==='asc'?'↑':'↓'):'↑';
  renderHeroList();
}
function renderHeroList(){
  var q=(document.getElementById('side-search').value||'').toLowerCase();
  var defUsed=allDefHeroes(),atkUsed=allAtkHeroes();
  var isSkill=pick&&pick.mode==='skill';
  var rarityOrder={oldsena:0,legendary:1,epic:2,rare:3};
  var list=heroes.filter(function(h){
    if(heroFilter!=='전체'&&h.type!==heroFilter)return false;
    if(q&&h.name.toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  list=list.slice().sort(function(a,b){
    var cmp=0;
    if(sortBy==='name'){cmp=a.name.localeCompare(b.name,'ko');}
    else{var ra=rarityOrder[a.rarity]!==undefined?rarityOrder[a.rarity]:9;var rb=rarityOrder[b.rarity]!==undefined?rarityOrder[b.rarity]:9;cmp=ra-rb;}
    return sortDir==='asc'?cmp:-cmp;
  });
  var html=list.map(function(h){
    var dimmed=false;
    if(pick&&pick.mode==='hero'){var deck=decks.find(function(d){return d.id===pick.deckId;});var grp=deck?getGroup(deck,pick.subMode,pick.atkIdx):null;if(grp&&grp.heroes.indexOf(h.id)!==-1)dimmed=true;}
    if(isSkill){var deck=decks.find(function(d){return d.id===pick.deckId;});var grp=deck?getGroup(deck,pick.subMode,pick.atkIdx):null;if(!grp||grp.heroes.indexOf(h.id)===-1)dimmed=true;}
    var hl='';
    if(!dimmed&&pick){if(pick.mode==='hero'&&pick.subMode==='atk')hl=' hl-atk';else if(pick.mode==='hero'&&pick.subMode==='def')hl=' hl-def';else if(isSkill)hl=' hl-skill';}
    var defB=defUsed.has(h.id)?'<div class="in-def-badge">방어</div>':'';
    var atkB=atkUsed.has(h.id)?'<div class="in-atk-badge">공격</div>':'';
    var skillHtml='';
    if(isSkill&&!dimmed){
      var s1=h.s1?'<img class="cc-skill" src="'+h.s1+'" onclick="event.stopPropagation();assignSkill(\''+h.id+'\',1)">':'<div class="cc-skill-empty"></div>';
      var s2=h.s2?'<img class="cc-skill" src="'+h.s2+'" onclick="event.stopPropagation();assignSkill(\''+h.id+'\',2)">':'<div class="cc-skill-empty"></div>';
      skillHtml='<div class="char-card-skills">'+s1+s2+'</div>';
    }
    return '<div class="char-card'+(dimmed?' dimmed':hl)+'" onclick="'+(isSkill?'':'assignHero(\''+h.id+'\')')+'">'
      +heroThumb(h,50)+defB+atkB+'<div class="cname">'+xe(h.name)+'</div><div class="ctype type-'+h.type+'">'+h.type+'</div>'+skillHtml+'</div>';
  }).join('');
  document.getElementById('char-list').innerHTML=html;
}
function renderPetList(){
  var html=pets.map(function(p){
    return '<div class="char-card hl-pet" onclick="assignPet(\''+p.id+'\')">'
      +'<div class="pimg" style="width:50px;height:50px;border-radius:7px;margin:0 auto 3px;">'
      +(p.img?'<img src="'+p.img+'" style="width:100%;height:100%;object-fit:cover;">':'<span style="font-size:22px;line-height:50px;display:block;text-align:center;">🐾</span>')
      +'</div>'
      +'<div class="cname">'+xe(p.name)+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('pet-list').innerHTML=html||'<div style="color:var(--text3);font-size:12px;padding:8px 0;grid-column:1/-1">상단 🐾 펫 관리에서 추가하세요.</div>';
}

// ── HERO MODAL ────────────────────────────────────────────────
function openHeroModal(){cancelHeroEdit();document.getElementById('modal-hero').classList.add('open');renderModalHeroes();}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function handleHeroImg(e){var f=e.target.files[0];if(!f)return;compressImage(f,200,function(d){pendingHeroImg=d;var p=document.getElementById('img-preview');p.src=d;p.style.display='block';document.getElementById('img-hint').style.display='none';});}
function handleSkillImg(e,num){var f=e.target.files[0];if(!f)return;compressImage(f,120,function(d){if(num===1){pendingSkill1=d;var p=document.getElementById('skill1-preview');p.src=d;p.style.display='block';document.getElementById('skill1-hint').style.display='none';}else{pendingSkill2=d;var p=document.getElementById('skill2-preview');p.src=d;p.style.display='block';document.getElementById('skill2-hint').style.display='none';}});}
function saveHero(){
  var name=document.getElementById('h-name').value.trim();if(!name){showToast('이름을 입력하세요');return;}
  var type=document.getElementById('h-type').value,rarity=document.getElementById('h-rarity').value,emoji=document.getElementById('h-emoji').value||'⚔';
  if(editHeroId){
    var h=heroes.find(function(x){return x.id===editHeroId;});
    if(h){h.name=name;h.type=type;h.rarity=rarity;h.emoji=emoji;if(pendingHeroImg)h.img=pendingHeroImg;if(pendingSkill1)h.s1=pendingSkill1;if(pendingSkill2)h.s2=pendingSkill2;}
    persistOneHero(h);showToast('수정됨');
  } else {
    var newH={id:'c'+Date.now(),name:name,type:type,rarity:rarity,emoji:emoji,img:pendingHeroImg,s1:pendingSkill1,s2:pendingSkill2};
    heroes.push(newH);persistOneHero(newH);showToast(name+' 추가됨');
  }
  cancelHeroEdit();renderHeroList();renderModalHeroes();
}
function editHero(id){
  var h=heroes.find(function(x){return x.id===id;});if(!h)return;
  editHeroId=id;pendingHeroImg='';pendingSkill1='';pendingSkill2='';
  document.getElementById('modal-hero-title').textContent='영웅 수정';
  document.getElementById('h-name').value=h.name;document.getElementById('h-type').value=h.type;document.getElementById('h-rarity').value=h.rarity;document.getElementById('h-emoji').value=h.emoji||'';
  function si(pid,src,hid){if(src){var p=document.getElementById(pid);p.src=src;p.style.display='block';document.getElementById(hid).style.display='none';}else{document.getElementById(pid).style.display='none';document.getElementById(hid).style.display='';}}
  si('img-preview',h.img,'img-hint');si('skill1-preview',h.s1,'skill1-hint');si('skill2-preview',h.s2,'skill2-hint');
  document.getElementById('btn-cancel-edit').style.display='';document.getElementById('h-name').focus();
}
function cancelHeroEdit(){
  editHeroId=null;pendingHeroImg='';pendingSkill1='';pendingSkill2='';
  document.getElementById('modal-hero-title').textContent='영웅 추가';
  document.getElementById('h-name').value='';document.getElementById('h-type').value='공격형';document.getElementById('h-rarity').value='legendary';document.getElementById('h-emoji').value='';
  ['img-preview','skill1-preview','skill2-preview'].forEach(function(id){document.getElementById(id).style.display='none';});
  ['img-hint','skill1-hint','skill2-hint'].forEach(function(id){document.getElementById(id).style.display='';});
  document.getElementById('btn-cancel-edit').style.display='none';
}
function delHero(id){
  var h=heroes.find(function(x){return x.id===id;});if(!h||!confirm('['+h.name+'] 삭제할까요?'))return;
  decks.forEach(function(d){
    function cg(g){g.heroes=g.heroes.map(function(x){return x===id?null:x;});g.skillOrder=g.skillOrder.map(function(so){return(so&&so.heroId===id)?null:so;});}
    d.defs.forEach(cg);d.atks.forEach(cg);
  });
  heroes=heroes.filter(function(x){return x.id!==id;});
  deleteOneHero(id);persist();render();renderModalHeroes();
}
function renderModalHeroes(){
  document.getElementById('modal-char-grid').innerHTML=heroes.map(function(h){
    return '<div style="position:relative;text-align:center;cursor:pointer" onclick="editHero(\''+h.id+'\')">'
      +heroThumb(h,44)+'<div style="font-size:9px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+xe(h.name)+'</div>'
      +'<div onclick="event.stopPropagation();delHero(\''+h.id+'\')" style="position:absolute;top:0;right:0;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer">✕</div>'
      +'</div>';
  }).join('');
}

// ── PET MODAL ─────────────────────────────────────────────────
function openPetModal(){cancelPetEdit();document.getElementById('modal-pet').classList.add('open');renderModalPets();}
function handlePetImg(e){var f=e.target.files[0];if(!f)return;compressImage(f,150,function(d){pendingPetImg=d;var p=document.getElementById('pet-img-preview');p.src=d;p.style.display='block';document.getElementById('pet-img-hint').style.display='none';});}
function savePet(){
  var name=document.getElementById('p-name').value.trim();if(!name){showToast('이름을 입력하세요');return;}
  if(editPetId){var p=pets.find(function(x){return x.id===editPetId;});if(p){p.name=name;if(pendingPetImg)p.img=pendingPetImg;}showToast('수정됨');}
  else{pets.push({id:'p'+Date.now(),name:name,img:pendingPetImg});showToast(name+' 추가됨');}
  cancelPetEdit();persist();renderPetList();renderModalPets();
}
function editPet(id){
  var p=pets.find(function(x){return x.id===id;});if(!p)return;
  editPetId=id;pendingPetImg='';
  document.getElementById('modal-pet-title').textContent='펫 수정';document.getElementById('p-name').value=p.name;
  if(p.img){var prev=document.getElementById('pet-img-preview');prev.src=p.img;prev.style.display='block';document.getElementById('pet-img-hint').style.display='none';}
  else{document.getElementById('pet-img-preview').style.display='none';document.getElementById('pet-img-hint').style.display='';}
  document.getElementById('btn-cancel-pet-edit').style.display='';
}
function cancelPetEdit(){
  editPetId=null;pendingPetImg='';
  document.getElementById('modal-pet-title').textContent='펫 추가';document.getElementById('p-name').value='';
  document.getElementById('pet-img-preview').style.display='none';document.getElementById('pet-img-hint').style.display='';
  document.getElementById('pet-img-file').value='';document.getElementById('btn-cancel-pet-edit').style.display='none';
}
function delPet(id){
  if(!confirm('펫을 삭제할까요?'))return;
  decks.forEach(function(d){
    function cg(g){if(!g.pets)g.pets=[null,null,null];g.pets=g.pets.map(function(x){return x===id?null:x;});}
    d.defs.forEach(cg);d.atks.forEach(cg);
  });
  pets=pets.filter(function(x){return x.id!==id;});
  persist();renderPetList();renderModalPets();renderDecks();
}
function renderModalPets(){
  document.getElementById('modal-pet-grid').innerHTML=pets.map(function(p){
    return '<div style="position:relative;text-align:center;cursor:pointer" onclick="editPet(\''+p.id+'\')">'
      +'<div class="pimg" style="width:44px;height:44px;border-radius:7px;margin:0 auto 2px">'+(p.img?'<img src="'+p.img+'" style="width:100%;height:100%;object-fit:cover">':'<span style="font-size:20px">🐾</span>')+'</div>'
      +'<div style="font-size:9px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+xe(p.name)+'</div>'
      +'<div onclick="event.stopPropagation();delPet(\''+p.id+'\')" style="position:absolute;top:0;right:0;width:14px;height:14px;border-radius:50%;background:rgba(224,85,85,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer">✕</div>'
      +'</div>';
  }).join('')||'<div style="color:var(--text3);font-size:12px;padding:4px;grid-column:1/-1">아직 펫이 없어요</div>';
}

function toggleTheme(){
  var isLight=document.body.classList.toggle('light');
  var btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=isLight?'🌑 라이트모드':'🌙 다크모드';
  localStorage.setItem('sk6_theme',isLight?'light':'dark');
}
function initTheme(){
  var t=localStorage.getItem('sk6_theme');
  if(t==='light'){
    document.body.classList.add('light');
    var btn=document.getElementById('theme-btn');
    if(btn)btn.textContent='🌑 라이트모드';
  }
}
function xe(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1800);}
function render(){renderDecks();renderHeroList();}

// ── FIRESTORE 동기화 ──────────────────────────────────────────
function applyMainData(data){
  if(!data)return;
  if(data.pets&&Array.isArray(data.pets))pets=data.pets;
  if(data.decks&&Array.isArray(data.decks)){
    decks=data.decks;
    decks.forEach(function(d){
      if(!d.defs){
        var og=d.def||{heroes:[null,null,null],skillOrder:[null,null,null],pets:[null,null,null],formation:''};
        if(Array.isArray(og))og={heroes:og,skillOrder:[null,null,null],pets:[null,null,null],formation:''};
        d.defs=[og];delete d.def;
      }
      d.defs.forEach(function(g){if(!g.formation)g.formation='';if(!g.pets)g.pets=[null,null,null];if(!g.skillOrder)g.skillOrder=[null,null,null];if(!g.note)g.note='';});
      if(!d.atks){d.atks=[emptyGroup()];}
      else d.atks=d.atks.map(function(a){if(Array.isArray(a)||!a.heroes)return emptyGroup();if(!a.skillOrder)a.skillOrder=[null,null,null];if(!a.pets)a.pets=[null,null,null];if(!a.formation)a.formation='';return a;});
      if(!d.note)d.note='';
    });
  }
  localStorage.setItem('sk6_decks',JSON.stringify(decks));
  localStorage.setItem('sk6_pets',JSON.stringify(pets));
}
function applyHeroesData(docs){
  if(!docs||!docs.length)return;
  var loaded=[];
  docs.forEach(function(d){var h=d.data();if(!h.s1)h.s1='';if(!h.s2)h.s2='';loaded.push(h);});
  heroes=loaded;
  localStorage.setItem('sk6_heroes',JSON.stringify(heroes));
}

window.addEventListener('DOMContentLoaded',function(){
  initTheme();
  // 덱 드래그 앤 드롭
  setTimeout(function(){
    var cont=document.getElementById('decks-container');
    if(!cont)return;
    cont.addEventListener('dragover',function(e){
      e.preventDefault();
      var target=e.target.closest('.deck-row');
      document.querySelectorAll('.deck-row.drag-over').forEach(function(el){el.classList.remove('drag-over');});
      if(target&&_deckDragId&&target.id!=='dk-'+_deckDragId)target.classList.add('drag-over');
    });
    cont.addEventListener('drop',function(e){
      e.preventDefault();
      var target=e.target.closest('.deck-row');
      document.querySelectorAll('.deck-row.drag-over').forEach(function(el){el.classList.remove('drag-over');});
      if(!target||!_deckDragId)return;
      var toId=target.id.replace('dk-','');
      if(toId===_deckDragId)return;
      var fi=decks.findIndex(function(x){return x.id===_deckDragId;});
      var ti=decks.findIndex(function(x){return x.id===toId;});
      if(fi<0||ti<0)return;
      var tmp=decks[fi];decks[fi]=decks[ti];decks[ti]=tmp;
      persist();renderDecks();
    });
  },500);
  render();
  showToast('서버에서 데이터 불러오는 중...');
  if(!window._fb){showToast('⚠ 오프라인 모드');return;}
  var mainLoaded=false,heroesLoaded=false;
  function tryRender(){if(mainLoaded&&heroesLoaded){render();showToast('✅ 동기화 완료');}}
  window._fb.onSnapshot(window._fb.GUILD_DOC,function(snap){
    if(snap.exists()){
      var data=snap.data();
      if(data.heroes&&Array.isArray(data.heroes)&&data.heroes.length>0&&!data._migrated){
        showToast('⏳ 마이그레이션 중...');
        window._fb.migrateHeroes(data.heroes).then(function(){showToast('✅ 마이그레이션 완료');});
      }
      applyMainData(data);
    } else {
      window._fb.persistMain({decks:decks,pets:pets,updatedAt:Date.now()});
      heroes.forEach(function(h){window._fb.persistHero(h);});
      showToast('✅ 처음 연결됨');
    }
    mainLoaded=true;tryRender();
  },function(err){console.error(err);showToast('⚠ 오프라인 모드');mainLoaded=true;tryRender();});
  window._fb.onSnapshot(window._fb.HEROES_COL,function(snap){
    var docs=[];snap.forEach(function(d){docs.push(d);});
    if(docs.length>0)applyHeroesData(docs);
    heroesLoaded=true;tryRender();
  },function(err){console.error(err);heroesLoaded=true;tryRender();});
});
</script>
</body>
</html>
